  # Proxmox VE via prometheus-pve-exporter on swarm-wk-0 (host publish 192.168.1.121:9221).
  - job_name: pve
    metrics_path: /pve
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['192.168.1.10']
        labels:
          platform: proxmox
          node_domain: hypervisor
          hostname: pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.1.121:9221

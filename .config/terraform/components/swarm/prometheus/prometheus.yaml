  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.1.120:8080']
        labels:
          platform: docker
          node_domain: swarm
          hostname: swarm-cp-0.local
      - targets: ['192.168.1.121:8080']

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-ast-grep
  namespace: mcp-ast-grep
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-ast-grep
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-ast-grep
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: mcp-ast-grep-registry
      containers:
        - name: mcp-ast-grep
          image: harbor.nodadyoushutup.com/mcp-ast-grep/mcp-ast-grep:2026.04.16.3
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: AST_GREP_HOST
              value: 0.0.0.0
            - name: AST_GREP_PORT
              value: "8096"
            - name: AST_GREP_DEFAULT_PROJECT_ROOT
              value: /mnt/eapp/code
            - name: AST_GREP_ALLOWED_ROOTS
              value: /mnt/eapp/code
            - name: AST_GREP_WORKSPACE_ROOT_HEADER
              value: x-workspace-root
            - name: AST_GREP_WORKSPACE_ROOT_QUERY_PARAM
              value: workspace_root
            - name: MCP_HTTP_PATH
              value: /mcp
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          volumeMounts:
            - name: code
              mountPath: /mnt/eapp/code
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: code
          nfs:
            server: 192.168.1.100
            path: /mnt/eapp/code

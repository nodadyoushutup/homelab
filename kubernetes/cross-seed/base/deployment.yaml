apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-seed
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cross-seed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cross-seed
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      containers:
        - name: cross-seed
          image: ghcr.io/cross-seed/cross-seed:6
          imagePullPolicy: IfNotPresent
          args:
            - daemon
          env:
            - name: TZ
              value: America/New_York
          envFrom:
            - configMapRef:
                name: cross-seed-runtime
            - secretRef:
                name: cross-seed-secrets
                optional: false
          ports:
            - name: http
              containerPort: 2468
              protocol: TCP
          volumeMounts:
            - name: cross-seed-config
              mountPath: /config
            - name: cross-seed-config-js
              mountPath: /config/config.js
              subPath: config.js
              readOnly: true
            - name: media
              mountPath: /media
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pgrep -f "cross-seed daemon" >/dev/null
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pgrep -f "cross-seed daemon" >/dev/null
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pgrep -f "cross-seed daemon" >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: cross-seed-config
          persistentVolumeClaim:
            claimName: cross-seed-config
        - name: cross-seed-config-js
          configMap:
            name: cross-seed-config-js
        - name: media
          nfs:
            server: 192.168.1.100
            path: /mnt/epool/media

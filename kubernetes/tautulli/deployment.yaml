apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli
  namespace: tautulli
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tautulli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tautulli
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      initContainers:
        - name: fix-config-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if find /config \( ! -user 1000 -o ! -group 1000 \) -print -quit | grep -q .; then
                echo "Repairing /config ownership to 1000:1000"
                find /config \( ! -user 1000 -o ! -group 1000 \) -print0 | xargs -0 chown 1000:1000
              else
                echo "No ownership repair needed for /config"
              fi
          volumeMounts:
            - name: tautulli-config
              mountPath: /config
      containers:
        - name: tautulli
          image: tautulli/tautulli:v2.17.2
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          volumeMounts:
            - name: tautulli-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: tautulli-config
          persistentVolumeClaim:
            claimName: tautulli-config

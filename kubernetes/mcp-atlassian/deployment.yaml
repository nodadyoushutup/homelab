apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-atlassian
  namespace: mcp-atlassian
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-atlassian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-atlassian
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-atlassian
          image: ghcr.io/sooperset/mcp-atlassian:latest@sha256:6c4f96725b0e775a014a0b3016d358efdab58efd57c37ad7c2050136545b0e00
          imagePullPolicy: IfNotPresent
          args:
            - --transport
            - streamable-http
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --path
            - /mcp
            - --toolsets
            - all
          envFrom:
            - secretRef:
                name: mcp-atlassian-app-env
          env:
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

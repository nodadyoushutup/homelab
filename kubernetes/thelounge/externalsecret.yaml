apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: thelounge-bootstrap
  namespace: thelounge
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: thelounge-vault
  target:
    name: thelounge-bootstrap
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: TL_USERNAME
      remoteRef:
        key: k8s/thelounge
        property: username
    - secretKey: TL_PASSWORD
      remoteRef:
        key: k8s/thelounge
        property: password

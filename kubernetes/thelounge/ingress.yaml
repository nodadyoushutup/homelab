apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thelounge
  namespace: thelounge
spec:
  ingressClassName: nginx
  rules:
    - host: thelounge.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thelounge
                port:
                  number: 9000

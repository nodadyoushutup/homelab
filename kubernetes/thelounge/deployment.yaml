apiVersion: apps/v1
kind: Deployment
metadata:
  name: thelounge
  namespace: thelounge
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: thelounge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thelounge
    spec:
      securityContext:
        fsGroup: 1000
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      initContainers:
        - name: bootstrap-user
          image: ghcr.io/thelounge/thelounge:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: THELOUNGE_HOME
              value: /var/opt/thelounge
            - name: TL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: thelounge-bootstrap
                  key: TL_USERNAME
            - name: TL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thelounge-bootstrap
                  key: TL_PASSWORD
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              : "${TL_USERNAME:?TL_USERNAME is required}"
              : "${TL_PASSWORD:?TL_PASSWORD is required}"
              user_file="/var/opt/thelounge/users/${TL_USERNAME}.json"
              profile_file="/bootstrap/profile"
              mkdir -p /var/opt/thelounge/users
              if [ ! -f "$user_file" ]; then
                if [ -s "$profile_file" ]; then
                  echo "Seeding The Lounge user profile for ${TL_USERNAME} from Vault-backed secret"
                  cp "$profile_file" "$user_file"
                else
                  echo "Creating The Lounge user ${TL_USERNAME}"
                  thelounge add --password "${TL_PASSWORD}" "${TL_USERNAME}"
                fi
              else
                echo "The Lounge user ${TL_USERNAME} exists; keeping profile and syncing password."
              fi
              if [ ! -f "$user_file" ]; then
                echo "Failed to bootstrap The Lounge user ${TL_USERNAME}" >&2
                exit 1
              fi
              echo "Syncing password for ${TL_USERNAME} from Vault secret"
              thelounge reset --password "${TL_PASSWORD}" "${TL_USERNAME}"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: thelounge-data
              mountPath: /var/opt/thelounge
            - name: bootstrap-secret
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: thelounge
          image: ghcr.io/thelounge/thelounge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: thelounge-data
              mountPath: /var/opt/thelounge
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: bootstrap-secret
          secret:
            secretName: thelounge-bootstrap
        - name: thelounge-data
          persistentVolumeClaim:
            claimName: thelounge-data

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-git
  namespace: mcp-git
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-git
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-git
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: mcp-git-registry
      containers:
        - name: mcp-git
          image: harbor.nodadyoushutup.com/mcp-git/mcp-git:2026.04.20.1
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: MCP_GIT_REPOSITORY_ROOT
              value: /mnt/eapp/code/homelab
            - name: MCP_GIT_LISTEN_PORT
              value: "8099"
          ports:
            - name: http
              containerPort: 8099
              protocol: TCP
          volumeMounts:
            - name: code
              mountPath: /mnt/eapp/code
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: code
          nfs:
            server: 192.168.1.100
            path: /mnt/eapp/code

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clusterplex-worker
  namespace: clusterplex
  labels:
    app.kubernetes.io/instance: clusterplex
    app.kubernetes.io/name: worker
spec:
  serviceName: clusterplex-worker
  replicas: 10
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: clusterplex
      app.kubernetes.io/name: worker
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: clusterplex
        app.kubernetes.io/name: worker
    spec:
      initContainers:
        - name: set-codec-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 1000:1000 /codecs && chmod 0755 -R /codecs && echo "Configured /codecs permissions"
          volumeMounts:
            - name: codecs
              mountPath: /codecs
        - name: set-transcode-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 1000:1000 /transcode && chmod 0777 -R /transcode && echo "Configured /transcode permissions"
          volumeMounts:
            - name: transcode
              mountPath: /transcode
        - name: set-tmp-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 1000:1000 /run/plex-temp && chmod 0777 -R /run/plex-temp && echo "Configured /run/plex-temp permissions"
          volumeMounts:
            - name: worker-tmpfs
              mountPath: /run/plex-temp
      containers:
        - name: clusterplex-worker
          image: linuxserver/plex:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: clusterplex-worker-config
          ports:
            - name: http
              containerPort: 3501
              protocol: TCP
          volumeMounts:
            - name: media
              mountPath: /media
            - name: transcode
              mountPath: /transcode
            - name: codecs
              mountPath: /codecs
            - name: worker-tmpfs
              mountPath: /run/plex-temp
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 6Gi
      volumes:
        - name: media
          nfs:
            server: 192.168.1.100
            path: /mnt/epool/media
        - name: transcode
          persistentVolumeClaim:
            claimName: clusterplex-transcode
        - name: worker-tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: codecs
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: truenas-iscsi-csi-retain

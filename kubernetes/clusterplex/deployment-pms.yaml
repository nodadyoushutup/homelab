apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterplex-pms
  namespace: clusterplex
  labels:
    app.kubernetes.io/instance: clusterplex
    app.kubernetes.io/name: pms
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: clusterplex
      app.kubernetes.io/name: pms
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: clusterplex
        app.kubernetes.io/name: pms
    spec:
      initContainers:
        - name: set-transcoder-tempdir
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: ALLOWED_NETWORKS
              valueFrom:
                configMapKeyRef:
                  name: clusterplex-pms-config
                  key: ALLOWED_NETWORKS
            - name: LAN_NETWORKS_BANDWIDTH
              valueFrom:
                configMapKeyRef:
                  name: clusterplex-pms-config
                  key: LAN_NETWORKS_BANDWIDTH
          command:
            - sh
            - -c
            - |
              PREF="/config/Library/Application Support/Plex Media Server/Preferences.xml"
              if [ ! -f "$PREF" ]; then
                echo "Preferences.xml not found yet; skipping TranscoderTempDirectory update"
                exit 0
              fi

              if grep -q 'TranscoderTempDirectory="' "$PREF"; then
                sed -i 's#TranscoderTempDirectory="[^"]*"#TranscoderTempDirectory="/transcode"#' "$PREF"
              else
                sed -i 's#<Preferences #<Preferences TranscoderTempDirectory="/transcode" #' "$PREF"
              fi

              NETWORKS="${ALLOWED_NETWORKS:-10.244.0.0/16,192.168.1.0/24,127.0.0.1/8}"
              ESCAPED_NETWORKS="$(printf '%s' "$NETWORKS" | sed 's/[&]/\\&/g')"
              BANDWIDTH_NETWORKS="${LAN_NETWORKS_BANDWIDTH:-192.168.1.0/24}"
              ESCAPED_BANDWIDTH_NETWORKS="$(printf '%s' "$BANDWIDTH_NETWORKS" | sed 's/[&]/\\&/g')"

              if grep -q 'allowedNetworks="' "$PREF"; then
                sed -i "s#allowedNetworks=\"[^\"]*\"#allowedNetworks=\"${ESCAPED_NETWORKS}\"#" "$PREF"
              else
                sed -i "s#<Preferences #<Preferences allowedNetworks=\"${ESCAPED_NETWORKS}\" #" "$PREF"
              fi

              if grep -q 'LanNetworksBandwidth="' "$PREF"; then
                sed -i "s#LanNetworksBandwidth=\"[^\"]*\"#LanNetworksBandwidth=\"${ESCAPED_BANDWIDTH_NETWORKS}\"#" "$PREF"
              else
                sed -i "s#<Preferences #<Preferences LanNetworksBandwidth=\"${ESCAPED_BANDWIDTH_NETWORKS}\" #" "$PREF"
              fi

              echo "Ensured TranscoderTempDirectory=/transcode, allowedNetworks, and LanNetworksBandwidth in Preferences.xml"
          volumeMounts:
            - name: config
              mountPath: /config
        - name: set-transcode-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 1000:1000 /transcode && chmod 0777 -R /transcode && echo "Configured /transcode permissions"
          volumeMounts:
            - name: transcode
              mountPath: /transcode
      containers:
        - name: clusterplex-pms
          image: linuxserver/plex:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: clusterplex-pms-config
          ports:
            - name: plex
              containerPort: 32400
              protocol: TCP
            - name: relay
              containerPort: 32499
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: transcode
              mountPath: /transcode
          startupProbe:
            httpGet:
              path: /identity
              port: plex
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 80
          readinessProbe:
            httpGet:
              path: /identity
              port: plex
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /identity
              port: plex
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: clusterplex-pms-config-owned
        - name: media
          nfs:
            server: 192.168.1.100
            path: /mnt/epool/media
        - name: transcode
          nfs:
            server: 192.168.1.100
            path: /mnt/eapp/k8s/nfs/vols/pvc-3fbda2f1-7dd1-4806-9c05-f9424dbe29c0

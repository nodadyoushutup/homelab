apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: controller-agent-state
  namespace: controller-agent
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: truenas-iscsi-csi-retain

langgraph-cloud:
  fullnameOverride: controller-agent
  namespace: controller-agent

  commonAnnotations:
    argocd.argoproj.io/sync-wave: "20"

  images:
    registry: harbor.nodadyoushutup.com
    imagePullSecrets:
      - name: controller-agent-registry
    apiServerImage:
      repository: controller-agent/controller-agent
      pullPolicy: IfNotPresent
      tag: 2026.04.18.1

  config:
    numberOfJobsPerWorker: 10

  ingress:
    enabled: true
    hostname: langsmith.nodadyoushutup.com
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

  apiServer:
    deployment:
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      envFrom:
        - secretRef:
            name: controller-agent-app-env
    service:
      type: ClusterIP

  queue:
    enabled: true
    deployment:
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      envFrom:
        - secretRef:
            name: controller-agent-app-env

  postgres:
    statefulSet:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      persistence:
        enabled: true
        size: 8Gi
        storageClassName: truenas-iscsi-csi-retain

  redis:
    deployment:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  mongo:
    enabled: false

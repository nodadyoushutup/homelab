apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: privatebin-vault
  namespace: privatebin
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  provider:
    vault:
      server: http://192.168.1.22:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: privatebin-vault-reader
          key: VAULT_TOKEN

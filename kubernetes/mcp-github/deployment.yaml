apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-github
  namespace: mcp-github
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-github
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-github
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: mcp-github-registry
      containers:
        - name: mcp-github
          image: ghcr.io/nodadyoushutup/mcp-github:0.0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: mcp-github-app-env
          env:
            - name: TZ
              value: America/New_York
            - name: MCP_GITHUB_LISTEN_PORT
              value: "8082"
            - name: GITHUB_MCP_TOOLSETS
              value: "all"
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

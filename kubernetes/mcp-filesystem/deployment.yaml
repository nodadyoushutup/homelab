apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-filesystem
  namespace: mcp-filesystem
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-filesystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-filesystem
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-filesystem
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - >
              export HOME=/tmp &&
              export PATH=/tmp/.local/bin:$PATH &&
              python -m pip install --quiet --no-cache-dir --user "mcp==1.27.0" "uvicorn==0.34.2" &&
              export PYTHONPATH=/mnt/eapp/code/homelab/applications/mcp-filesystem/src &&
              exec python -m mcp_filesystem.server
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: MCP_FILESYSTEM_PORT
              value: "8098"
            - name: MCP_FILESYSTEM_ALLOWED_WORKSPACE_ROOTS
              value: /mnt/eapp/code
            - name: MCP_FILESYSTEM_WORKSPACE_MAP
              value: homelab=/mnt/eapp/code/homelab
            - name: MCP_FILESYSTEM_DEFAULT_ACCESS_MODE
              value: read-only
          ports:
            - name: http
              containerPort: 8098
              protocol: TCP
          volumeMounts:
            - name: code
              mountPath: /mnt/eapp/code
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: code
          nfs:
            server: 192.168.1.100
            path: /mnt/eapp/code

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-filesystem
  namespace: mcp-filesystem
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-filesystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-filesystem
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: mcp-filesystem-registry
      containers:
        - name: mcp-filesystem
          image: harbor.nodadyoushutup.com/mcp-filesystem/mcp-filesystem:2026.04.18.204045
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: MCP_FILESYSTEM_WORKSPACE_ROOT
              value: /mnt/eapp/code/homelab
            - name: MCP_FILESYSTEM_LISTEN_PORT
              value: "8098"
          ports:
            - name: http
              containerPort: 8098
              protocol: TCP
          volumeMounts:
            - name: code
              mountPath: /mnt/eapp/code
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: code
          nfs:
            server: 192.168.1.100
            path: /mnt/eapp/code/homelab

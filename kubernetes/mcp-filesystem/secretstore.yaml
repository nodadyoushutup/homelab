apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: mcp-filesystem-vault
  namespace: mcp-filesystem
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  provider:
    vault:
      server: http://192.168.1.120:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: mcp-filesystem-vault-reader
          key: VAULT_TOKEN

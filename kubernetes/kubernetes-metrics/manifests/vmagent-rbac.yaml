apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-metrics-agent
  labels:
    app.kubernetes.io/name: kubernetes-metrics-agent
    app.kubernetes.io/part-of: monitoring
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes/metrics
      - nodes/proxy
    verbs:
      - get

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-metrics-agent
  labels:
    app.kubernetes.io/name: kubernetes-metrics-agent
    app.kubernetes.io/part-of: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-metrics-agent
subjects:
  - kind: ServiceAccount
    name: kubernetes-metrics-agent
    namespace: monitoring

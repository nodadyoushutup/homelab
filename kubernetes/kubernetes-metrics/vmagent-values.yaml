fullnameOverride: kubernetes-metrics-agent

mode: deployment
replicaCount: 1

serviceAccount:
  create: true
  name: kubernetes-metrics-agent
  automountToken: true

# RBAC is intentionally defined in manifests/vmagent-rbac.yaml so the agent
# receives only node discovery and kubelet proxy access.
rbac:
  create: false

remoteWrite:
  - url: http://192.168.1.120:8428/api/v1/write

config:
  global:
    scrape_interval: 10s
    scrape_timeout: 8s
    external_labels:
      platform: kubernetes
      node_domain: cluster
      cluster: homelab

  scrape_configs:
    - job_name: kubernetes-cadvisor
      scheme: https
      kubernetes_sd_configs:
        - role: node
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      relabel_configs:
        - source_labels: [__meta_kubernetes_node_name]
          target_label: node
        - source_labels: [__meta_kubernetes_node_name]
          target_label: hostname
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          target_label: __metrics_path__
          replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
      metric_relabel_configs:
        - source_labels: [__name__]
          action: keep
          regex: 'container_cpu_usage_seconds_total|container_last_seen|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_fs_usage_bytes|container_fs_limit_bytes|container_fs_reads_bytes_total|container_fs_writes_bytes_total|machine_cpu_cores|machine_memory_bytes'

    - job_name: kube-state-metrics
      static_configs:
        - targets:
            - kube-state-metrics.monitoring.svc.cluster.local:8080
      metric_relabel_configs:
        - source_labels: [__name__]
          action: keep
          regex: 'kube_pod_info|kube_pod_owner|kube_pod_labels|kube_pod_status_phase|kube_pod_container_info|kube_pod_container_status_ready|kube_pod_container_status_restarts_total|kube_replicaset_owner|kube_deployment_spec_replicas|kube_deployment_status_replicas|kube_deployment_status_replicas_available|kube_deployment_status_replicas_unavailable|kube_deployment_status_replicas_updated|kube_statefulset_replicas|kube_statefulset_status_replicas_ready|kube_daemonset_status_desired_number_scheduled|kube_daemonset_status_number_ready'

service:
  enabled: true
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  enabled: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-google-workspace
  namespace: mcp-google-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-google-workspace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-google-workspace
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: mcp-google-workspace-registry
      containers:
        - name: mcp-google-workspace
          image: harbor.nodadyoushutup.com/mcp-google-workspace/mcp-google-workspace:2026.03.09.1
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: mcp-google-workspace-app-env
          env:
            - name: TZ
              value: America/New_York
            - name: MCP_GOOGLE_WORKSPACE_LISTEN_PORT
              value: "8086"
            - name: WORKSPACE_MCP_SERVICE_ACCOUNT_FILE
              value: /workspace-secrets/service_account.json
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          volumeMounts:
            - name: service-account
              mountPath: /workspace-secrets
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: service-account
          secret:
            secretName: mcp-google-workspace-service-account
            items:
              - key: service_account.json
                path: service_account.json

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-google-workspace-service-account
  namespace: mcp-google-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: mcp-google-workspace-vault
  target:
    name: mcp-google-workspace-service-account
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        service_account.json: "{{ .service_account_json }}"
  data:
    - secretKey: service_account_json
      remoteRef:
        key: k8s/mcp_google_workspace
        property: service_account_json
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

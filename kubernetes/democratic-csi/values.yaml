csiDriver:
  name: org.democratic-csi.truenas-iscsi

driver:
  config:
    driver: freenas-api-iscsi
    instance_id: homelab-iscsi
    httpConnection:
      protocol: https
      host: 192.168.1.100
      port: 443
      username: root
      password: CHANGE_ME
      allowInsecure: true
      apiVersion: 2
    zfs:
      datasetParentName: tank/k8s/iscsi/vols
      detachedSnapshotsDatasetParentName: tank/k8s/iscsi/snaps
      zvolEnableReservation: false
    iscsi:
      targetPortal: "192.168.1.100:3260"
      interface: ""
      namePrefix: csi-
      nameSuffix: -homelab
      targetGroups:
        - targetGroupPortalGroup: 1
          targetGroupInitiatorGroup: 1
          targetGroupAuthType: None
      extentInsecureTpc: true
      extentXenCompat: false
      extentDisablePhysicalBlocksize: true
      extentBlocksize: 512
      extentRpm: SSD
      extentAvailThreshold: 0

node:
  driver:
    iscsiDirHostPathType: DirectoryOrCreate

storageClasses:
  - name: truenas-iscsi-csi
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: picsur
  namespace: picsur
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "128m"
spec:
  ingressClassName: nginx
  rules:
    - host: picsur.nodadyoushutup.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: picsur
                port:
                  number: 8080

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: picsur-secrets
  namespace: picsur
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: picsur-vault
  target:
    name: picsur-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: PICSUR_DB_DATABASE
      remoteRef:
        key: k8s/picsur
        property: db_database
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PICSUR_DB_USERNAME
      remoteRef:
        key: k8s/picsur
        property: db_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PICSUR_DB_PASSWORD
      remoteRef:
        key: k8s/picsur
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PICSUR_ADMIN_PASSWORD
      remoteRef:
        key: k8s/picsur
        property: admin_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PICSUR_JWT_SECRET
      remoteRef:
        key: k8s/picsur
        property: jwt_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_DB
      remoteRef:
        key: k8s/picsur
        property: db_database
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_USER
      remoteRef:
        key: k8s/picsur
        property: db_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: k8s/picsur
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: langflow-vault
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  provider:
    vault:
      server: http://192.168.1.120:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: langflow-vault-reader
          key: VAULT_TOKEN

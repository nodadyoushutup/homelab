apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-secrets
  namespace: qbittorrent-movie-2
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: qbittorrent-vault
  target:
    name: qbittorrent-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: WEBUI_PASSWORD_PBKDF2
      remoteRef:
        key: k8s/qbittorrent/movie-2
        property: webui_password_pbkdf2
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

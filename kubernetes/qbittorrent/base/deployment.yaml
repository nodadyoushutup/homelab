apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      initContainers:
        - name: render-qbittorrent-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              mkdir -p /config/qBittorrent
              cp /config-template/qBittorrent.conf.tmpl /tmp/qBittorrent.conf

              escape_sed_replacement() {
                printf '%s' "$1" | sed -e 's/[\\/&]/\\&/g'
              }

              sed -i \
                -e "s/__WEBUI_PASSWORD_PBKDF2__/$(escape_sed_replacement "$WEBUI_PASSWORD_PBKDF2")/g" \
                -e "s/__WEBUI_PORT__/$(escape_sed_replacement "$WEBUI_PORT")/g" \
                -e "s/__TORRENTING_PORT__/$(escape_sed_replacement "$TORRENTING_PORT")/g" \
                /tmp/qBittorrent.conf

              if ! cp /tmp/qBittorrent.conf /config/qBittorrent/qBittorrent.conf; then
                # Some existing PVCs reject overwriting this file; keep the current config instead of crash-looping.
                echo "WARN: could not overwrite /config/qBittorrent/qBittorrent.conf; using existing file" >&2
              fi
              if [ -f /config/qBittorrent/qBittorrent.conf ]; then
                chmod 600 /config/qBittorrent/qBittorrent.conf || true
              fi
          env:
            - name: WEBUI_PORT
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-runtime
                  key: WEBUI_PORT
            - name: TORRENTING_PORT
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-runtime
                  key: TORRENTING_PORT
            - name: WEBUI_PASSWORD_PBKDF2
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-secrets
                  key: WEBUI_PASSWORD_PBKDF2
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbittorrent-config-template
              mountPath: /config-template
              readOnly: true
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:4.6.2
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: WEBUI_PORT
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-runtime
                  key: WEBUI_PORT
            - name: TORRENTING_PORT
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-runtime
                  key: TORRENTING_PORT
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: bittorrent-tcp
              containerPort: 10096
              protocol: TCP
            - name: bittorrent-udp
              containerPort: 10096
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /media
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          nfs:
            server: 192.168.1.100
            path: /mnt/epool/media
        - name: qbittorrent-config-template
          configMap:
            name: qbittorrent-config-template

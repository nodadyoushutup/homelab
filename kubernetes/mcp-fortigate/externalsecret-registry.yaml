apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-fortigate-registry
  namespace: mcp-fortigate
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: mcp-fortigate-vault
  target:
    name: mcp-fortigate-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .ghcr_username }}","password":"{{ .ghcr_password }}","auth":"{{ printf "%s:%s" .ghcr_username .ghcr_password | b64enc }}"}}}
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: k8s/mcp_fortigate
        metadataPolicy: None

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-argocd
  namespace: mcp-argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-argocd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-argocd
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-argocd
          image: ghcr.io/argoproj-labs/mcp-for-argocd:latest@sha256:ef703dc15d0534c5368f835ae4948ac212055a3486481a56b05e9eb042a4ea6f
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ "${ARGOCD_INSECURE_SKIP_VERIFY:-false}" = "true" ]; then
                export NODE_TLS_REJECT_UNAUTHORIZED=0
              fi
              exec node dist/index.js http --port 3000
          envFrom:
            - secretRef:
                name: mcp-argocd-app-env
          env:
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - fetch('http://127.0.0.1:3000/mcp',{headers:{'mcp-session-id':'healthcheck'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - fetch('http://127.0.0.1:3000/mcp',{headers:{'mcp-session-id':'healthcheck'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))
            initialDelaySeconds: 15
            periodSeconds: 20

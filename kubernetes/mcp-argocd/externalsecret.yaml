apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-argocd-app-env
  namespace: mcp-argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: mcp-argocd-vault
  target:
    name: mcp-argocd-app-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        ARGOCD_BASE_URL: "{{ .argocd_base_url }}"
        ARGOCD_API_TOKEN: "{{ .argocd_api_token }}"
        MCP_READ_ONLY: "{{ .mcp_read_only }}"
        ARGOCD_INSECURE_SKIP_VERIFY: "{{ .argocd_insecure_skip_verify }}"
  data:
    - secretKey: argocd_base_url
      remoteRef:
        key: k8s/mcp_argocd
        property: argocd_base_url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: argocd_api_token
      remoteRef:
        key: k8s/mcp_argocd
        property: argocd_api_token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: mcp_read_only
      remoteRef:
        key: k8s/mcp_argocd
        property: mcp_read_only
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: argocd_insecure_skip_verify
      remoteRef:
        key: k8s/mcp_argocd
        property: argocd_insecure_skip_verify
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

# seriohub/vui — Velero UI (single-cluster) in namespace velero alongside Velero server.
# Credentials: kubernetes/velero/manifests/secret-vui-api.yaml (committed; not Vault for now).

global:
  veleroNamespace: velero
  clusterName: homelab
  core: false
  k8SInclusterMode: true

apiService:
  deployment:
    storage:
      enabled: false
    # Velero 1.18+ uses Queued/ReadyToStart phases; stock velero-api:0.3.1 omits them (vui-api#68).
    volumeMounts:
      - name: backup-model-patch
        mountPath: /app/models/k8s/backup.py
        subPath: backup.py
        readOnly: true
    volumes:
      - name: backup-model-patch
        configMap:
          name: vui-api-backup-model
  secret:
    existingSecret: vui-api-credentials

uiService:
  deployment:
    # Next.js bakes NEXT_PUBLIC_* at pod start; bump this when exposure.clusterIP.localAddress changes.
    annotations:
      homelab.nodadyoushutup.com/vui-api-exposure-host: vui.nodadyoushutup.com
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

watchdogService:
  deployment:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  config:
    apprise: ""

# Ingress is kubernetes/velero/manifests/ingress-vui.yaml (avoids duplicate chart Ingress).
exposure:
  mode: clusterIP
  clusterIP:
    protocol: https
    wsProtocol: wss
    localAddress: vui.nodadyoushutup.com

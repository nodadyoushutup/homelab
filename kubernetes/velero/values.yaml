# Velero — MinIO (S3-compatible) + CSI snapshots via democratic-csi / snapshot-controller.
# Credentials: secret velero-s3-credentials (ExternalSecret or bootstrap example secret).

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.13.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  useSecret: true
  existingSecret: velero-s3-credentials

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: us-east-1
        s3ForcePathStyle: "true"
        s3Url: http://192.168.1.120:9000
        insecureSkipTLSVerify: "true"
  features: EnableCSI

backupsEnabled: true
snapshotsEnabled: true
deployNodeAgent: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

upgradeCRDs: true

rbac:
  create: true
  clusterAdministrator: true

serviceAccount:
  server:
    create: true

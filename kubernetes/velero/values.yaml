# Velero — MinIO (S3-compatible) + CSI snapshot data movement to off-cluster object storage.
# CSI snapshots on TrueNAS during backup; node-agent copies PVC blocks into the BSL (MinIO).
# Inline NFS volume mounts in Deployments are not PVCs and are not backed up.
# Credentials: secret velero-s3-credentials (ExternalSecret or bootstrap example secret).

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.13.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  useSecret: true
  existingSecret: velero-s3-credentials

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-misc
      # Ad-hoc backups not tied to a per-app BSL; per-app buckets are separate MinIO buckets.
      default: true
      config:
        region: us-east-1
        s3ForcePathStyle: "true"
        s3Url: http://192.168.1.25:9000
        insecureSkipTLSVerify: "true"
  features: EnableCSI

backupsEnabled: true
# Legacy VolumeSnapshotLocation CRs are not used; CSI snapshots use feature EnableCSI.
snapshotsEnabled: false
# Required for CSI snapshot data movement (snapshotMoveData) into MinIO.
deployNodeAgent: true

nodeAgent:
  # CSI data movement only; no filesystem-backup hostPath mounts.
  disableHostPath: true
  podSecurityContext:
    runAsUser: 0
  containerSecurityContext:
    privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

# CRDs installed on first deploy; avoid re-running upgrade job (bitnami kubectl image issues).
upgradeCRDs: false

# Chart 11.x defaults to bitnamilegacy/kubectl tags that may not exist on the cluster.
kubectl:
  image:
    repository: registry.k8s.io/kubectl
    tag: v1.35.0

rbac:
  create: true
  clusterAdministrator: true

serviceAccount:
  server:
    create: true

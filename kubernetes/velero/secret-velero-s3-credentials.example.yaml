# Velero AWS-plugin credentials for MinIO (S3-compatible).
# Prefer Vault path k8s/velero via manifests/externalsecret-s3.yaml once
# velero-vault-reader exists in namespace velero.
#
# Bootstrap until Vault is populated:
#   kubectl create namespace velero --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic velero-s3-credentials -n velero \
#     --from-literal=cloud='[default]
# aws_access_key_id=REPLACE_ME
# aws_secret_access_key=REPLACE_ME' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# MinIO S3 API: http://192.168.1.67:9000 (Console :9001 is not the S3 endpoint).
# Bucket (once): mc alias set v http://192.168.1.67:9000 ... && mc mb v/velero-backups
apiVersion: v1
kind: Secret
metadata:
  name: velero-s3-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id: REPLACE_ME
    aws_secret_access_key: REPLACE_ME

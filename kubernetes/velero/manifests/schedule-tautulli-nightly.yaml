# Nightly Velero backups: 5-minute stagger from 00:00 (cluster local time).

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tautulli-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  schedule: "40 0 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - tautulli
    storageLocation: tautulli
    ttl: 336h0m0s

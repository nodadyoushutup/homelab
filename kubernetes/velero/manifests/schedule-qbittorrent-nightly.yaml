# Nightly Velero schedules for qBittorrent instances (config PVCs only; media is NFS).
# Cron: first run ~5m after deploy, +10m per instance (27 namespaces).
# Restore production window (00:10–04:30 UTC stagger) after testing.

---

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: qbittorrent-books-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  schedule: "6 23 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - qbittorrent-books
    storageLocation: qbittorrent-books
    ttl: 336h0m0s

---


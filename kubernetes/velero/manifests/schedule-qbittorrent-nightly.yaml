# Nightly Velero backups: 5-minute stagger from 00:00 (cluster local time).

---

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: qbittorrent-books-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  schedule: "50 0 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - qbittorrent-books
    storageLocation: qbittorrent-books
    ttl: 336h0m0s


# Nightly Velero schedules for qBittorrent instances (config PVCs only; media is NFS).

---

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: qbittorrent-books-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  schedule: "10 0 * * *"
  template:
    includedNamespaces:
      - qbittorrent-books
    storageLocation: default
    ttl: 336h0m0s


apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: picsur-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  schedule: "0 7 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - picsur
    storageLocation: picsur
    ttl: 336h0m0s

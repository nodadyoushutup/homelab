# VUI ingress (mirrors seriohub/vui chart when exposure.mode=ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vui-ingress
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    # NPM terminates TLS and forwards HTTP; do not bounce back to HTTPS (redirect loop).
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: velero.nodadyoushutup.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vui-ui-clusterip-svc
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vui-api-clusterip-svc
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: vui-api-clusterip-svc
                port:
                  number: 80

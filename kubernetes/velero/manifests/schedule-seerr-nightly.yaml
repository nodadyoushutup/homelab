# Nightly Velero backups: 5-minute stagger from 00:00 (cluster local time).

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: seerr-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  schedule: "30 0 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - seerr
    storageLocation: seerr
    ttl: 336h0m0s

# Per-app MinIO buckets on http://192.168.1.25:9000 (one bucket per app).
# Layout per bucket: <bucket>/backups/<backup-name>/ and <bucket>/kopia/<namespace>/
# Velero always uses a backups/ subdirectory at the bucket root.

apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: radarr
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  provider: aws
  accessMode: ReadWrite
  objectStorage:
    bucket: radarr
  config:
    region: us-east-1
    s3ForcePathStyle: "true"
    s3Url: http://192.168.1.25:9000
    insecureSkipTLSVerify: "true"
---


# Per-app MinIO prefixes: velero-backups/<app>/backups/<backup-name>/

# Velero always uses a backups/ subdirectory under the BSL prefix.

# Manual or legacy backups can keep using the Helm default BSL (no prefix).

apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: radarr
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  provider: aws
  accessMode: ReadWrite
  objectStorage:
    bucket: velero-backups
    prefix: radarr
  config:
    region: us-east-1
    s3ForcePathStyle: "true"
    s3Url: http://192.168.1.120:9000
    insecureSkipTLSVerify: "true"

---


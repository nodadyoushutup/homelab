# Nightly Velero backups: 5-minute stagger from 00:00 (cluster local time).

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: sonarr-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  schedule: "35 0 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - sonarr
    storageLocation: sonarr
    ttl: 336h0m0s

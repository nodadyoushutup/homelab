apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: langgraph-nightly
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  schedule: "0 9 * * *"
  template:
    snapshotMoveData: true
    includedNamespaces:
      - langgraph
    storageLocation: langgraph
    ttl: 336h0m0s

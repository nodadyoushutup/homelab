apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: velero-vault
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    vault:
      server: http://192.168.1.120:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: velero-vault-reader
          key: VAULT_TOKEN

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubernetes
  namespace: mcp-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-kubernetes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kubernetes
    spec:
      enableServiceLinks: false
      serviceAccountName: mcp-kubernetes-viewer
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-kubernetes
          image: quay.io/containers/kubernetes_mcp_server:v0.0.60@sha256:766a7282e0536d951d805f72b562d89707eefb84d35dcfd96e31c410071f6164
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --port
            - "8106"
            - --cluster-provider
            - in-cluster
            - --toolsets
            - core,config
            - --list-output
            - yaml
            - --read-only
            - --disable-multi-cluster
            - --stateless
          env:
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 8106
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

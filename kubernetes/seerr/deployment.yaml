apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: seerr
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seerr
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.38
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              until nc -z seerr-postgres 5432; do
                echo "Waiting for seerr-postgres..."
                sleep 2
              done
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.3.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: seerr-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: seerr-secrets
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: seerr-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: seerr-secrets
                  key: POSTGRES_DB
          ports:
            - name: http
              containerPort: 5055
              protocol: TCP
          volumeMounts:
            - name: seerr-config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: seerr-config
          persistentVolumeClaim:
            claimName: seerr-config

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr-secrets
  namespace: seerr
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: seerr-vault
  target:
    name: seerr-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: k8s/seerr
        property: db_main_db
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_USER
      remoteRef:
        key: k8s/seerr
        property: db_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: k8s/seerr
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarm-mcp-kubernetes-viewer
  namespace: argocd
---
apiVersion: v1
kind: Secret
metadata:
  name: swarm-mcp-kubernetes-viewer-token
  namespace: argocd
  annotations:
    kubernetes.io/service-account.name: swarm-mcp-kubernetes-viewer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swarm-mcp-kubernetes-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: swarm-mcp-kubernetes-viewer
    namespace: argocd

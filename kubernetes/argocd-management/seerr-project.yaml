apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: seerr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "41"
spec:
  description: Seerr manifests managed from homelab GitOps repo
  sourceRepos:
    - git@github.com:nodadyoushutup/homelab.git
    - https://github.com/nodadyoushutup/homelab.git
  destinations:
    - namespace: seerr
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: langgraph
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "47"
spec:
  description: LangGraph standalone deployment managed from homelab GitOps repo
  sourceRepos:
    - git@github.com:nodadyoushutup/homelab.git
    - https://github.com/nodadyoushutup/homelab.git
    - https://langchain-ai.github.io/helm/
  destinations:
    - namespace: langgraph
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langgraph
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "48"
spec:
  project: langgraph
  destination:
    server: https://kubernetes.default.svc
    namespace: langgraph
  source:
    repoURL: git@github.com:nodadyoushutup/homelab.git
    targetRevision: HEAD
    path: kubernetes/langgraph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cross-seed-bhd
  namespace: argocd
  labels:
    app.kubernetes.io/name: cross-seed
    app.kubernetes.io/part-of: cross-seed
    app.kubernetes.io/instance: bhd
  annotations:
    argocd.argoproj.io/sync-wave: "83"
spec:
  project: cross-seed
  destination:
    server: https://kubernetes.default.svc
    namespace: cross-seed-bhd
  source:
    repoURL: git@github.com:nodadyoushutup/homelab.git
    targetRevision: HEAD
    path: kubernetes/cross-seed/overlays/bhd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: langchain-agent-chat
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "45"
spec:
  description: LangChain Agent Chat manifests managed from homelab GitOps repo
  sourceRepos:
    - git@github.com:nodadyoushutup/homelab.git
    - https://github.com/nodadyoushutup/homelab.git
  destinations:
    - namespace: langchain-agent-chat
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langchain-agent-chat
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "46"
spec:
  project: langchain-agent-chat
  destination:
    server: https://kubernetes.default.svc
    namespace: langchain-agent-chat
  source:
    repoURL: git@github.com:nodadyoushutup/homelab.git
    targetRevision: HEAD
    path: kubernetes/langchain-agent-chat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

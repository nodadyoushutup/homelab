apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: qbittorrent
  namespace: argocd
  labels:
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/part-of: qbittorrent
  annotations:
    argocd.argoproj.io/sync-wave: "38"
spec:
  description: qBittorrent instances managed from homelab GitOps repo
  sourceRepos:
    - git@github.com:nodadyoushutup/homelab.git
    - https://github.com/nodadyoushutup/homelab.git
  destinations:
    - namespace: qbittorrent-movie-0
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-1
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-2
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-3
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-4
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-5
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-6
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-7
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movie-8
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-movies
      server: https://kubernetes.default.svc
    - namespace: qbittorrent-torrents
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: argocd-vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  provider:
    vault:
      server: http://192.168.1.26:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: argocd-vault-reader
          key: VAULT_TOKEN

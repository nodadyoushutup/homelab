# Terminal/exec settings only — must keep Argo CD install labels or the server cannot find this CM.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: Delete=false
data:
  url: https://argocd.nodadyoushutup.com
  admin.enabled: "true"
  accounts.admin: apiKey, login
  exec.enabled: "true"
  resource.customizations.ignoreResourceUpdates.all: |-
    jsonPointers:
      - /status
  resource.customizations.health.external-secrets.io_SecretStore: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Vault reachability is validated by ESO; ignore for app health"
    return hs
  resource.customizations.health.external-secrets.io_ExternalSecret: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Secret sync is validated by ESO; ignore for app health"
    return hs

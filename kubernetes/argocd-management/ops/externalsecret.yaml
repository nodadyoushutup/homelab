apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: argocd-vault
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: discord-webhook-url
      remoteRef:
        key: k8s/argocd
        property: discord_webhook_url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

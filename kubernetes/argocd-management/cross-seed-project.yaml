apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cross-seed
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "36"
spec:
  description: cross-seed manifests managed from homelab GitOps repo
  sourceRepos:
    - git@github.com:nodadyoushutup/homelab.git
    - https://github.com/nodadyoushutup/homelab.git
  destinations:
    - namespace: cross-seed-bhd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

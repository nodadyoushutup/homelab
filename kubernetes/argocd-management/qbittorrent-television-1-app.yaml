apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent-television-1
  namespace: argocd
  labels:
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/part-of: qbittorrent
    app.kubernetes.io/instance: television-1
  annotations:
    argocd.argoproj.io/sync-wave: "71"
spec:
  project: qbittorrent
  destination:
    server: https://kubernetes.default.svc
    namespace: qbittorrent-television-1
  source:
    repoURL: git@github.com:nodadyoushutup/homelab.git
    targetRevision: HEAD
    path: kubernetes/qbittorrent/overlays/television-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

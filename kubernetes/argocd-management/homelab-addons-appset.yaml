# Platform add-ons: upstream Helm charts + homelab values, or plain manifests.
# Synced via the argocd-management root Application (Terraform-managed).
# Add new platform-style entries to spec.generators[0].list.elements below.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - appType: helm
            chartName: metallb
            chartRepo: https://metallb.github.io/metallb
            chartVersion: "0.15.3"
            destinationNamespace: metallb-system
            gitPath: kubernetes/metallb
            helmReleaseName: metallb
            name: metallb
            syncWave: "10"
          - appType: helm
            chartName: ingress-nginx
            chartRepo: https://kubernetes.github.io/ingress-nginx
            chartVersion: "4.14.3"
            destinationNamespace: ingress-nginx
            gitPath: kubernetes/ingress-nginx
            helmReleaseName: ingress-nginx
            name: ingress-nginx
            syncWave: "20"
          - appType: helm
            chartName: democratic-csi
            chartRepo: https://democratic-csi.github.io/charts
            chartVersion: "0.15.1"
            destinationNamespace: democratic-csi
            gitPath: kubernetes/democratic-csi-iscsi
            helmReleaseName: democratic-csi
            name: democratic-csi-iscsi
            syncWave: "25"
          - appType: helm
            chartName: democratic-csi
            chartRepo: https://democratic-csi.github.io/charts
            chartVersion: "0.15.1"
            destinationNamespace: democratic-csi-nfs
            gitPath: kubernetes/democratic-csi-nfs
            helmReleaseName: democratic-csi-nfs
            name: democratic-csi-nfs
            syncWave: "26"
          - appType: helm
            chartName: external-secrets
            chartRepo: https://charts.external-secrets.io
            chartVersion: "2.1.0"
            destinationNamespace: external-secrets
            gitPath: kubernetes/external-secrets
            helmReleaseName: external-secrets
            name: external-secrets
            syncWave: "27"
          - appType: helm
            chartName: prometheus-node-exporter
            chartRepo: https://prometheus-community.github.io/helm-charts
            chartVersion: "4.52.0"
            destinationNamespace: monitoring
            gitPath: kubernetes/node-exporter
            helmReleaseName: node-exporter
            name: node-exporter-k8s
            syncWave: "28"
          - appType: manifests
            destinationNamespace: thelounge
            gitPath: kubernetes/thelounge
            name: thelounge
            syncWave: "30"
          - appType: manifests
            destinationNamespace: picsur
            gitPath: kubernetes/picsur
            name: picsur
            syncWave: "31"
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: default
      revisionHistoryLimit: 0
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destinationNamespace}}"
      source:
        repoURL: git@github.com:nodadyoushutup/homelab.git
        targetRevision: HEAD
        path: "{{.gitPath}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
  templatePatch: |
    spec:
      {{- if eq .appType "helm" }}
      source: null
      sources:
        - repoURL: '{{.chartRepo}}'
          chart: '{{.chartName}}'
          targetRevision: '{{.chartVersion}}'
          helm:
            releaseName: '{{.helmReleaseName}}'
            valueFiles:
              - '$values/{{.gitPath}}/values.yaml'
        - repoURL: git@github.com:nodadyoushutup/homelab.git
          targetRevision: HEAD
          ref: values
        - repoURL: git@github.com:nodadyoushutup/homelab.git
          targetRevision: HEAD
          path: '{{.gitPath}}'
      {{- else if eq .appType "manifests" }}
      source:
        repoURL: git@github.com:nodadyoushutup/homelab.git
        targetRevision: HEAD
        path: '{{.gitPath}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      {{- end }}

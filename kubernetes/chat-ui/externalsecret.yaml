apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chat-ui-registry
  namespace: chat-ui
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: chat-ui-vault
  target:
    name: chat-ui-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .registry }}":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: registry
      remoteRef:
        key: k8s/chat_ui
        property: harbor_registry
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: username
      remoteRef:
        key: k8s/chat_ui
        property: harbor_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: k8s/chat_ui
        property: harbor_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

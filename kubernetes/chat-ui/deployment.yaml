apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: chat-ui
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: chat-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-ui
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: chat-ui-registry
      containers:
        - name: chat-ui
          image: harbor.nodadyoushutup.com/chat-ui/chat-ui:2026.04.18.1
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: /api
            - name: NEXT_PUBLIC_ASSISTANT_ID
              value: controller_agent
            - name: NEXT_PUBLIC_AUTH_SCHEME
              value: ""
            - name: LANGGRAPH_API_URL
              value: https://langgraph.nodadyoushutup.com
            - name: LANGSMITH_API_KEY
              value: ""
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph
  namespace: langgraph
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: langgraph
          image: ghcr.io/nodadyoushutup/langgraph:0.0.1
          imagePullPolicy: Always
          workingDir: /app/langgraph/agent
          command:
            - sh
            - -c
            - exec langgraph dev --host 0.0.0.0 --port 2024 --no-browser --no-reload --n-jobs-per-worker ${LANGGRAPH_N_JOBS_PER_WORKER}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: langgraph-app-env
          env:
            - name: TZ
              value: America/New_York
            - name: LANGGRAPH_CLI_NO_ANALYTICS
              value: "1"
            - name: LANGGRAPH_N_JOBS_PER_WORKER
              value: "8"
            - name: HOMELAB_MCP_CODE_URL
              value: https://mcp.code.nodadyoushutup.com/mcp
          ports:
            - name: http
              containerPort: 2024
              protocol: TCP
          volumeMounts:
            - name: state
              mountPath: /app/langgraph/agent/.langgraph_api
          startupProbe:
            httpGet:
              path: /docs
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: langgraph-state

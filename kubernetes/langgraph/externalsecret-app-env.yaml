apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langgraph-app-env
  namespace: langgraph
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: langgraph-vault
  target:
    name: langgraph-app-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        SUPERVISOR_MODEL: "{{ .supervisor_model }}"
        JIRA_MODEL: "{{ .jira_model }}"
        CREATE_ISSUE_DEFAULT_PROJECT: "HOME"
        LANGSMITH_TRACING: "false"
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: k8s/langgraph
        property: openai_api_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: supervisor_model
      remoteRef:
        key: k8s/langgraph
        property: supervisor_model
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: jira_model
      remoteRef:
        key: k8s/langgraph
        property: jira_model
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

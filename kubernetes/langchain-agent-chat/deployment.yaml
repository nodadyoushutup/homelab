apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-agent-chat
  namespace: langchain-agent-chat
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: langchain-agent-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langchain-agent-chat
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-wk-0
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: langchain-agent-chat-registry
      containers:
        - name: langchain-agent-chat
          image: harbor.nodadyoushutup.com/homelab/langchain-agent-chat:2026.05.02.154539
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: America/New_York
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: https://langchain-agent-chat.nodadyoushutup.com/api
            - name: NEXT_PUBLIC_ASSISTANT_ID
              value: agent
            - name: NEXT_PUBLIC_AUTH_SCHEME
              value: ""
            - name: LANGGRAPH_API_URL
              value: http://langgraph.langgraph.svc.cluster.local
            - name: LANGSMITH_API_KEY
              value: ""
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

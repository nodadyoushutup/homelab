apiVersion: config.kio.kasten.io/v1alpha1
kind: Policy
metadata:
  name: k10-clusterplex-nightly
  namespace: kasten-io
spec:
  comment: Nightly backup and export policy for clusterplex namespace
  frequency: '@daily'
  retention:
    daily: 14
    weekly: 8
    monthly: 12
    yearly: 2
  actions:
    - action: backup
      backupParameters:
        filters:
          excludeResources:
            - group: ""
              version: v1
              resource: persistentvolumeclaims
              name: clusterplex-media
            - group: ""
              version: v1
              resource: persistentvolumeclaims
              name: clusterplex-transcode
    - action: export
      exportParameters:
        frequency: '@daily'
        profile:
          name: k10-s3-profile
          namespace: kasten-io
  selector:
    matchLabels:
      k10.kasten.io/appNamespace: clusterplex

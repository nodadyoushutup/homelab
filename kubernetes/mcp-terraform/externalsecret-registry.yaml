apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-terraform-registry
  namespace: mcp-terraform
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: mcp-terraform-vault
  target:
    name: mcp-terraform-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .harbor_registry }}":{"username":"{{ .harbor_username }}","password":"{{ .harbor_password }}","auth":"{{ printf "%s:%s" .harbor_username .harbor_password | b64enc }}"}}}
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: k8s/mcp_terraform
        metadataPolicy: None

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-4k-config
  namespace: radarr-4k
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 150Gi
  storageClassName: truenas-iscsi-csi-retain

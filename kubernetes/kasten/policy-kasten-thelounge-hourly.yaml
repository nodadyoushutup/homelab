apiVersion: config.kio.kasten.io/v1alpha1
kind: Policy
metadata:
  name: kasten-thelounge-hourly
  namespace: kasten-io
spec:
  comment: Hourly backup and export policy for thelounge namespace
  frequency: '@hourly'
  retention:
    hourly: 24
    daily: 7
    weekly: 4
    monthly: 12
    yearly: 2
  actions:
    - action: backup
    - action: export
      exportParameters:
        frequency: '@hourly'
        profile:
          name: kasten-s3-profile
          namespace: kasten-io
  selector:
    matchLabels:
      k10.kasten.io/appNamespace: thelounge

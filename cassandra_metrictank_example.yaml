version: "2.4"

services:
  cassandra:
    image: cassandra:3.9
    hostname: cassandra
    environment:
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  metrictank:
    image: grafana/metrictank
    hostname: metrictank
    depends_on:
      - cassandra
    ports:
      - "2003:2003"  # carbon plaintext ingestion
      - "6060:6060"  # metrictank http/api
    environment:
      WAIT_HOSTS: cassandra:9042
      WAIT_TIMEOUT: 60
      MT_HTTP_MULTI_TENANT: "false"

  graphite:
    image: raintank/graphite-mt
    hostname: graphite
    depends_on:
      - metrictank
    ports:
      - "8080:80"    # graphite query endpoint
    environment:
      GRAPHITE_CLUSTER_SERVERS: "metrictank:6060"
      GRAPHITE_STATSD_HOST: "statsdaemon"
      WSGI_PROCESSES: 4
      WSGI_THREADS: 25

  statsdaemon:
    image: raintank/statsdaemon
    hostname: statsdaemon
    ports:
      - "8125:8125/udp"

  grafana:
    image: grafana/grafana
    hostname: grafana
    ports:
      - "3000:3000"
    # optional provisioning volumes omitted for simplicity

volumes:
  cassandra_data:
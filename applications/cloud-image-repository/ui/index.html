<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud image repository</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <script>
      tailwind = {
        config: {
          darkMode: "class",
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="/app.js" defer></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="w-full min-h-screen p-3 md:p-4">
      <section class="mb-3 flex items-center justify-between rounded-xl border border-slate-800 bg-slate-900/80 p-2 backdrop-blur">
        <button
          id="back-button"
          type="button"
          class="inline-flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-amber-400 hover:text-amber-300"
        >
          <i class="fa-solid fa-arrow-left"></i>
          <span>Back</span>
        </button>
        <div class="flex items-center gap-2">
          <button
            id="add-button"
            type="button"
            class="inline-flex items-center gap-2 rounded-lg border border-amber-600/70 bg-amber-500/10 px-3 py-2 text-sm font-medium text-amber-200 transition hover:border-amber-400 hover:text-amber-100"
          >
            <i class="fa-solid fa-plus"></i>
            <span>Add</span>
          </button>
          <button
            id="refresh-button"
            type="button"
            class="inline-flex items-center rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-base text-slate-100 transition hover:border-amber-400 hover:text-amber-300"
            title="Refresh"
            aria-label="Refresh"
          >
            <i class="fa-solid fa-rotate-right"></i>
          </button>
        </div>
      </section>

      <section class="overflow-hidden rounded-xl border border-slate-800 bg-slate-900/70">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b border-slate-800 bg-slate-900/95 text-slate-300">
                <th class="px-4 py-3 font-semibold" scope="col" aria-sort="none">
                  <button
                    type="button"
                    class="sort-header inline-flex items-center gap-2 text-left transition hover:text-amber-300 focus:outline-none focus-visible:text-amber-300"
                    data-sort-key="name"
                  >
                    <span>Name</span>
                    <span class="sort-indicator text-xs text-slate-500" data-sort-indicator-for="name">-</span>
                  </button>
                </th>
                <th class="px-4 py-3 font-semibold" scope="col" aria-sort="none">
                  <button
                    type="button"
                    class="sort-header inline-flex items-center gap-2 text-left transition hover:text-amber-300 focus:outline-none focus-visible:text-amber-300"
                    data-sort-key="type"
                  >
                    <span>Type</span>
                    <span class="sort-indicator text-xs text-slate-500" data-sort-indicator-for="type">-</span>
                  </button>
                </th>
                <th class="px-4 py-3 font-semibold" scope="col" aria-sort="none">
                  <button
                    type="button"
                    class="sort-header inline-flex items-center gap-2 text-left transition hover:text-amber-300 focus:outline-none focus-visible:text-amber-300"
                    data-sort-key="size"
                  >
                    <span>Size (Disk)</span>
                    <span class="sort-indicator text-xs text-slate-500" data-sort-indicator-for="size">-</span>
                  </button>
                </th>
                <th class="px-4 py-3 font-semibold" scope="col" aria-sort="none">
                  <button
                    type="button"
                    class="sort-header inline-flex items-center gap-2 text-left transition hover:text-amber-300 focus:outline-none focus-visible:text-amber-300"
                    data-sort-key="modified"
                  >
                    <span>Modified</span>
                    <span class="sort-indicator text-xs text-slate-500" data-sort-indicator-for="modified">-</span>
                  </button>
                </th>
                <th class="px-4 py-3 text-right font-semibold">Delete</th>
              </tr>
            </thead>
            <tbody id="listing" class="divide-y divide-slate-800"></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="mt-2 text-xs text-slate-400">Loading...</p>
    </main>

    <section id="upload-modal" class="fixed inset-0 z-40 hidden items-center justify-center bg-slate-950/80 p-4">
      <div class="w-full max-w-xl rounded-xl border border-slate-700 bg-slate-900 p-4 shadow-2xl">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-base font-semibold text-slate-100">Upload Files</h2>
          <button
            id="upload-close"
            type="button"
            class="inline-flex items-center rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-sm text-slate-200 transition hover:border-slate-500 hover:text-white"
            aria-label="Close upload dialog"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <input id="upload-input" type="file" multiple class="hidden" />

        <label
          id="upload-dropzone"
          for="upload-input"
          class="flex min-h-36 cursor-pointer flex-col items-center justify-center rounded-xl border border-dashed border-slate-600 bg-slate-800/40 px-4 py-6 text-center transition hover:border-amber-400"
        >
          <i class="fa-solid fa-cloud-arrow-up text-2xl text-amber-300"></i>
          <p class="mt-3 text-sm text-slate-200">Drag and drop files here</p>
          <p class="text-xs text-slate-400">or click to select multiple files</p>
        </label>

        <p id="upload-selection" class="mt-3 text-xs text-slate-300">No files selected.</p>
        <p id="upload-status" class="mt-1 text-xs text-slate-400"></p>

        <div class="mt-4 flex items-center justify-end gap-2">
          <button
            id="upload-cancel"
            type="button"
            class="inline-flex items-center rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200 transition hover:border-slate-500 hover:text-white"
          >
            Cancel
          </button>
          <button
            id="upload-submit"
            type="button"
            class="inline-flex items-center gap-2 rounded-lg border border-amber-600/70 bg-amber-500/10 px-3 py-2 text-sm font-medium text-amber-200 transition hover:border-amber-400 hover:text-amber-100 disabled:cursor-not-allowed disabled:opacity-50"
            disabled
          >
            <i class="fa-solid fa-upload"></i>
            <span>Upload</span>
          </button>
        </div>
      </div>
    </section>
  </body>
</html>

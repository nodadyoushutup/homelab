{% extends "base.html" %}

{% block title %}{{ page_title }} · Torrent Manager{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <h1>{{ page_title }}</h1>
      <p class="lede">Name the pipeline now; add ordered tasks on the detail page after saving.</p>
    </div>
  </section>

  <form class="card form-grid" method="post" action="{{ form_action }}">
    <label class="full-width">
      <span>Name</span>
      <input type="text" name="name" required value="{{ pipeline.name if pipeline else '' }}" />
    </label>

    <label class="full-width">
      <span>Description</span>
      <textarea name="description" rows="4">{{ pipeline.description if pipeline and pipeline.description else '' }}</textarea>
    </label>

    <div class="form-actions full-width">
      <button type="submit" class="button button-primary">Save</button>
      <a class="button" href="{{ url_for('pipelines.list_pipelines') }}">Cancel</a>
    </div>
  </form>
{% endblock %}

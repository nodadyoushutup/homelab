<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Torrent Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ url_for('index') }}">Torrent Manager</a>
        <nav class="nav">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('clients.list_clients') }}">Clients</a>
          <a href="{{ url_for('torrents.list_torrents') }}">Torrents</a>
          <a href="{{ url_for('tasks.list_tasks') }}">Tasks</a>
          <a href="{{ url_for('pipelines.list_pipelines') }}">Pipelines</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack" id="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}" data-flash>{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>

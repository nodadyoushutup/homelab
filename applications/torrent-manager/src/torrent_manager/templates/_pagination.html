{% if page.total > 0 %}
  <nav class="pagination" aria-label="Pagination">
    <div class="pagination-meta muted">
      Page {{ page.page }} of {{ page.total_pages }} · {{ page.total }} total
    </div>
    <div class="pagination-actions">
      {% if page.has_prev %}
        <a class="button" href="{{ url_for(request.endpoint, page=page.prev_page) }}">Previous</a>
      {% else %}
        <span class="button button-disabled">Previous</span>
      {% endif %}
      {% if page.has_next %}
        <a class="button" href="{{ url_for(request.endpoint, page=page.next_page) }}">Next</a>
      {% else %}
        <span class="button button-disabled">Next</span>
      {% endif %}
    </div>
  </nav>
{% endif %}

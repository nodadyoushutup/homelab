{% extends "base.html" %}

{% block title %}{{ page_title }} · Torrent Manager{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <h1>{{ page_title }}</h1>
      <p class="lede">
        Pick a handler type and optional JSON config. Handlers execute in a silo with only that config.
      </p>
    </div>
  </section>

  <form class="card form-grid" method="post" action="{{ form_action }}">
    <label>
      <span>Name</span>
      <input type="text" name="name" required value="{{ task.name if task else '' }}" />
    </label>

    <label>
      <span>Task type</span>
      <select name="task_type">
        {% for value, label in task_type_choices %}
          <option
            value="{{ value }}"
            {% if task and task.task_type == value %}selected{% endif %}
          >
            {{ label }} ({{ value }})
          </option>
        {% endfor %}
      </select>
    </label>

    <label class="full-width">
      <span>Description</span>
      <textarea name="description" rows="3">{{ task.description if task and task.description else '' }}</textarea>
    </label>

    <label class="full-width">
      <span>Config (JSON object)</span>
      <textarea name="config_json" rows="8" class="mono">{{ task.config_json if task and task.config_json else '{}' }}</textarea>
    </label>

    <div class="form-actions full-width">
      <button type="submit" class="button button-primary">Save</button>
      <a class="button" href="{{ url_for('tasks.list_tasks') }}">Cancel</a>
    </div>
  </form>
{% endblock %}

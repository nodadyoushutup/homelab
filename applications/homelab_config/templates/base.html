<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}homelab-config{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="h-full bg-slate-950 text-slate-100 antialiased">
    <div class="flex min-h-screen">
      <aside
        class="flex w-64 shrink-0 flex-col border-r border-slate-800 bg-slate-900/60 p-4"
      >
        <div class="mb-8 flex items-center gap-2 px-2">
          <i class="fa-solid fa-screwdriver-wrench text-xl text-sky-400"></i>
          <span class="text-lg font-semibold tracking-tight">homelab-config</span>
        </div>
        <nav class="space-y-1">
          <span
            class="mb-1 block px-3 text-xs font-semibold uppercase tracking-wider text-slate-500"
            >Settings</span
          >
          <a
            href="/"
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition {% if active == 'swarm' %}bg-sky-500/10 text-sky-300{% else %}text-slate-300 hover:bg-slate-800/70{% endif %}"
          >
            <i class="fa-brands fa-docker w-5 text-center"></i>
            Docker Swarm
          </a>
        </nav>
        <div class="mt-auto px-3 pt-6 text-xs text-slate-600">
          Generates files under
          <code class="text-slate-500">.config/</code>
        </div>
      </aside>

      <main class="relative flex-1 overflow-y-auto">
        <div
          id="toast-root"
          class="pointer-events-none fixed right-4 top-4 z-50 space-y-2"
        ></div>
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>

name: GHA Runner - Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (example: 2026.03.08.6)"
        required: true

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: gha-runner

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.image_metadata.outputs.digest }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          version="${{ github.event.inputs.version }}"

          if [ -z "${version}" ]; then
            echo "Version is required." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Show build version
        run: |
          echo "Preparing GHA runner image for version ${{ steps.version.outputs.version }}"
          echo "::notice::Target runner image version ${{ steps.version.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-platform image and push by digest
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file docker/gha-runner/Dockerfile \
            --metadata-file gha-runner-image-metadata.json \
            --output=type=image,name=${GHCR_NAMESPACE}/${IMAGE_NAME},push=true,push-by-digest=true \
            .

      - name: Capture image digest
        id: image_metadata
        run: |
          digest="$(jq -r '.["containerimage.digest"]' gha-runner-image-metadata.json)"

          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "Image digest could not be determined" >&2
            cat gha-runner-image-metadata.json >&2 || true
            exit 1
          fi

          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-platform manifest
        run: |
          digest="${{ needs.build.outputs.digest }}"
          version="${{ needs.build.outputs.version }}"

          if [ -z "$digest" ] || [ -z "$version" ]; then
            echo "Digest or version is missing" >&2
            exit 1
          fi

          docker buildx imagetools create \
            --tag ${GHCR_NAMESPACE}/${IMAGE_NAME}:${version} \
            --tag ${GHCR_NAMESPACE}/${IMAGE_NAME}:latest \
            ${GHCR_NAMESPACE}/${IMAGE_NAME}:${version}@${digest}

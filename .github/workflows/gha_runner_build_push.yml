name: GHA Runner - Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (example: 2026.03.08.6)"
        required: true

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: gha-runner

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, homelab]

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Validate version input
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "${version}" ]; then
            echo "Version is required." >&2
            exit 1
          fi
          echo "Using version: ${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        run: |
          version="${{ github.event.inputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file docker/gha-runner/Dockerfile \
            --tag ${GHCR_NAMESPACE}/${IMAGE_NAME}:${version} \
            --tag ${GHCR_NAMESPACE}/${IMAGE_NAME}:latest \
            --push \
            .

name: Harbor - Build and Push Runtime Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
      target_registry:
        description: "Registry target for this publish"
        required: true
        default: both
        type: choice
        options:
          - both
          - github
          - harbor
      build_platforms:
        description: "Architectures to build"
        required: true
        default: both
        type: choice
        options:
          - both
          - amd64
          - arm64
      component_parallelism:
        description: "Max parallel component matrix jobs per architecture (1 = sequential)"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"

concurrency:
  group: harbor-runtime-${{ github.ref }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  HARBOR_REGISTRY: harbor.nodadyoushutup.com
  HARBOR_PROJECT: homelab

jobs:
  prepare:
    runs-on: [self-hosted, linux, homelab, build]
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_registry: ${{ steps.prepare.outputs.target_registry }}
      publish_github: ${{ steps.prepare.outputs.publish_github }}
      publish_harbor: ${{ steps.prepare.outputs.publish_harbor }}
      platforms: ${{ steps.prepare.outputs.platforms }}
      build_amd64: ${{ steps.prepare.outputs.build_amd64 }}
      build_arm64: ${{ steps.prepare.outputs.build_arm64 }}
      matrix_max_parallel: ${{ steps.prepare.outputs.matrix_max_parallel }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Prepare Harbor build parameters
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          version="${{ github.event.inputs.version }}"
          target_registry="${{ github.event.inputs.target_registry }}"
          requested_platforms="${{ github.event.inputs.build_platforms }}"
          component_parallelism="${{ github.event.inputs.component_parallelism }}"

          if [ -z "$version" ]; then
            echo "version is required" >&2
            exit 1
          fi

          case "$target_registry" in
            both) publish_github=true; publish_harbor=true ;;
            github) publish_github=true; publish_harbor=false ;;
            harbor) publish_github=false; publish_harbor=true ;;
            *)
              echo "Unsupported target_registry: $target_registry" >&2
              exit 1
              ;;
          esac

          case "$requested_platforms" in
            both) requested_platforms_csv="linux/amd64,linux/arm64" ;;
            amd64) requested_platforms_csv="linux/amd64" ;;
            arm64) requested_platforms_csv="linux/arm64" ;;
            *)
              echo "Unsupported build_platforms: $requested_platforms" >&2
              exit 1
              ;;
          esac

          build_amd64=false
          build_arm64=false
          IFS=',' read -r -a platform_list <<<"$requested_platforms_csv"
          for platform in "${platform_list[@]}"; do
            case "$platform" in
              linux/amd64) build_amd64=true ;;
              linux/arm64) build_arm64=true ;;
            esac
          done

          case "$component_parallelism" in
            1|2|3|4) matrix_max_parallel="$component_parallelism" ;;
            *)
              echo "Unsupported component_parallelism: ${component_parallelism}; using 2." >&2
              matrix_max_parallel="2"
              ;;
          esac

          {
            echo "version=$version"
            echo "target_registry=$target_registry"
            echo "publish_github=$publish_github"
            echo "publish_harbor=$publish_harbor"
            echo "platforms=$requested_platforms_csv"
            echo "build_amd64=$build_amd64"
            echo "build_arm64=$build_arm64"
            echo "matrix_max_parallel=${matrix_max_parallel}"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Harbor runtime publish version=${version} platforms=${requested_platforms_csv} target_registry=${target_registry} component_parallelism=${matrix_max_parallel} (full runtime set)"

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  harbor_bases_amd64:
    needs: prepare
    if: needs.prepare.outputs.build_amd64 == 'true'
    runs-on: [self-hosted, linux, homelab, amd64, build]
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "5"
      HARBOR_RETRY_INITIAL_DELAY: "30"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Harbor photon base images (AMD64)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail
          chmod 0755 applications/harbor/scripts/build-multiarch.sh
          applications/harbor/scripts/build-multiarch.sh \
            --photon-bases-only \
            --namespace "${GHCR_NAMESPACE}" \
            --tag "${{ needs.prepare.outputs.version }}" \
            --platforms linux/amd64 \
            --push \
            --no-manifest-publish

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_component_amd64:
    needs:
      - prepare
      - harbor_bases_amd64
    if: needs.prepare.outputs.build_amd64 == 'true'
    runs-on: [self-hosted, linux, homelab, amd64, build]
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare.outputs.matrix_max_parallel) }}
      matrix:
        component:
          - harbor-core
          - harbor-portal
          - harbor-jobservice
          - harbor-registryctl
          - harbor-db
          - harbor-registry-photon
          - harbor-redis-photon
          - harbor-nginx-photon
          - harbor-log
          - harbor-trivy-adapter-photon
          - harbor-exporter
          - harbor-prepare
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "5"
      HARBOR_RETRY_INITIAL_DELAY: "30"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push ${{ matrix.component }} (AMD64)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail

          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          build_component() {
            local namespace="$1"
            local path_mode="$2"
            local retag_from="${3:-}"
            local -a script_args=(
              --namespace "${namespace}"
              --tag "${{ needs.prepare.outputs.version }}"
              --path-mode "${path_mode}"
              --platforms linux/amd64
              --component "${{ matrix.component }}"
              --skip-build-base
              --push
              --no-manifest-publish
            )

            if [ -n "${retag_from}" ]; then
              script_args+=(--retag-from-namespace "${retag_from}")
            fi

            applications/harbor/scripts/build-multiarch.sh "${script_args[@]}"
          }

          built_namespace=""
          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            build_component "${GHCR_NAMESPACE}" "namespace-component"
            built_namespace="${GHCR_NAMESPACE}"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            if [ -n "${built_namespace}" ]; then
              build_component "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component" "${built_namespace}"
            else
              build_component "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
            fi
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  harbor_bases_arm64:
    needs: prepare
    if: needs.prepare.outputs.build_arm64 == 'true'
    runs-on: [self-hosted, linux, homelab, arm64]
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "5"
      HARBOR_RETRY_INITIAL_DELAY: "30"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Harbor photon base images (ARM64)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail
          chmod 0755 applications/harbor/scripts/build-multiarch.sh
          applications/harbor/scripts/build-multiarch.sh \
            --photon-bases-only \
            --namespace "${GHCR_NAMESPACE}" \
            --tag "${{ needs.prepare.outputs.version }}" \
            --platforms linux/arm64 \
            --push \
            --no-manifest-publish

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_component_arm64:
    needs:
      - prepare
      - harbor_bases_arm64
    if: needs.prepare.outputs.build_arm64 == 'true'
    runs-on: [self-hosted, linux, homelab, arm64]
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare.outputs.matrix_max_parallel) }}
      matrix:
        component:
          - harbor-core
          - harbor-portal
          - harbor-jobservice
          - harbor-registryctl
          - harbor-db
          - harbor-registry-photon
          - harbor-redis-photon
          - harbor-nginx-photon
          - harbor-log
          - harbor-trivy-adapter-photon
          - harbor-exporter
          - harbor-prepare
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "5"
      HARBOR_RETRY_INITIAL_DELAY: "30"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push ${{ matrix.component }} (ARM64)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail

          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          build_component() {
            local namespace="$1"
            local path_mode="$2"
            local retag_from="${3:-}"
            local -a script_args=(
              --namespace "${namespace}"
              --tag "${{ needs.prepare.outputs.version }}"
              --path-mode "${path_mode}"
              --platforms linux/arm64
              --component "${{ matrix.component }}"
              --skip-build-base
              --push
              --no-manifest-publish
            )

            if [ -n "${retag_from}" ]; then
              script_args+=(--retag-from-namespace "${retag_from}")
            fi

            applications/harbor/scripts/build-multiarch.sh "${script_args[@]}"
          }

          built_namespace=""
          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            build_component "${GHCR_NAMESPACE}" "namespace-component"
            built_namespace="${GHCR_NAMESPACE}"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            if [ -n "${built_namespace}" ]; then
              build_component "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component" "${built_namespace}"
            else
              build_component "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
            fi
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  publish_manifest:
    needs:
      - prepare
      - build_component_amd64
      - build_component_arm64
    if: >
      always() &&
      needs.build_component_amd64.result != 'failure' &&
      needs.build_component_amd64.result != 'cancelled' &&
      needs.build_component_arm64.result != 'failure' &&
      needs.build_component_arm64.result != 'cancelled'
    runs-on: [self-hosted, linux, homelab, build]

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Publish Harbor runtime multi-arch manifests
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail

          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          publish_manifests() {
            local namespace="$1"
            local path_mode="$2"

            applications/harbor/scripts/build-multiarch.sh \
              --manifest-only \
              --namespace "${namespace}" \
              --tag "${{ needs.prepare.outputs.version }}" \
              --path-mode "${path_mode}" \
              --platforms "${{ needs.prepare.outputs.platforms }}"
          }

          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            publish_manifests "${GHCR_NAMESPACE}" "namespace-component"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            publish_manifests "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

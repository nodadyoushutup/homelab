name: Harbor - Build and Push Runtime Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
      target_registry:
        description: "Registry target for this publish"
        required: true
        default: both
        type: choice
        options:
          - both
          - github
          - harbor
      build_platforms:
        description: "Architectures to build"
        required: true
        default: both
        type: choice
        options:
          - both
          - amd64
          - arm64

# One job per architecture runs the full Harbor build sequentially (upstream make order).
# amd64 and arm64 jobs may still run at the same time on different runner pools.
concurrency:
  group: harbor-runtime-${{ github.ref }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  HARBOR_REGISTRY: harbor.nodadyoushutup.com
  HARBOR_PROJECT: homelab

jobs:
  prepare:
    runs-on: [self-hosted, linux, homelab, build]
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_registry: ${{ steps.prepare.outputs.target_registry }}
      publish_github: ${{ steps.prepare.outputs.publish_github }}
      publish_harbor: ${{ steps.prepare.outputs.publish_harbor }}
      platforms: ${{ steps.prepare.outputs.platforms }}
      build_amd64: ${{ steps.prepare.outputs.build_amd64 }}
      build_arm64: ${{ steps.prepare.outputs.build_arm64 }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Prepare Harbor build parameters
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          version="${{ github.event.inputs.version }}"
          target_registry="${{ github.event.inputs.target_registry }}"
          requested_platforms="${{ github.event.inputs.build_platforms }}"

          if [ -z "$version" ]; then
            echo "version is required" >&2
            exit 1
          fi

          case "$target_registry" in
            both) publish_github=true; publish_harbor=true ;;
            github) publish_github=true; publish_harbor=false ;;
            harbor) publish_github=false; publish_harbor=true ;;
            *)
              echo "Unsupported target_registry: $target_registry" >&2
              exit 1
              ;;
          esac

          case "$requested_platforms" in
            both) requested_platforms_csv="linux/amd64,linux/arm64" ;;
            amd64) requested_platforms_csv="linux/amd64" ;;
            arm64) requested_platforms_csv="linux/arm64" ;;
            *)
              echo "Unsupported build_platforms: $requested_platforms" >&2
              exit 1
              ;;
          esac

          build_amd64=false
          build_arm64=false
          IFS=',' read -r -a platform_list <<<"$requested_platforms_csv"
          for platform in "${platform_list[@]}"; do
            case "$platform" in
              linux/amd64) build_amd64=true ;;
              linux/arm64) build_arm64=true ;;
            esac
          done

          {
            echo "version=$version"
            echo "target_registry=$target_registry"
            echo "publish_github=$publish_github"
            echo "publish_harbor=$publish_harbor"
            echo "platforms=$requested_platforms_csv"
            echo "build_amd64=$build_amd64"
            echo "build_arm64=$build_arm64"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Harbor sequential runtime publish version=${version} platforms=${requested_platforms_csv} target_registry=${target_registry}"

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_runtime_amd64:
    needs: prepare
    if: needs.prepare.outputs.build_amd64 == 'true'
    runs-on: [self-hosted, linux, homelab, amd64, build]
    concurrency:
      # Homelab runners often share one public IP; never pull from Hub on amd64 and arm64 at once.
      group: harbor-dockerhub-${{ github.repository }}
      cancel-in-progress: false
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "8"
      HARBOR_RETRY_INITIAL_DELAY: "60"
      HARBOR_REQUIRE_DOCKERHUB_LOGIN: "1"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Require Docker Hub credentials
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_PASSWORD }}" ]; then
            echo "::error::Add repository secrets DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD (free Docker Hub account). Harbor pulls photon:5.0, golang, and node from Docker Hub to build swagger/photon images before compile."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push full Harbor runtime set (AMD64, sequential)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail
          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          runtime_components=(
            harbor-core harbor-portal harbor-jobservice harbor-registryctl harbor-db
            harbor-registry-photon harbor-redis-photon harbor-nginx-photon harbor-log
            harbor-trivy-adapter-photon harbor-exporter harbor-prepare
          )

          publish_runtime() {
            local namespace="$1"
            local path_mode="$2"
            applications/harbor/scripts/build-multiarch.sh \
              --namespace "${namespace}" \
              --tag "${{ needs.prepare.outputs.version }}" \
              --path-mode "${path_mode}" \
              --platforms linux/amd64 \
              --push \
              --no-manifest-publish
          }

          retag_runtime_to_harbor() {
            local from_namespace="$1"
            local path_mode="$2"
            local component
            for component in "${runtime_components[@]}"; do
              applications/harbor/scripts/build-multiarch.sh \
                --namespace "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" \
                --tag "${{ needs.prepare.outputs.version }}" \
                --path-mode "${path_mode}" \
                --platforms linux/amd64 \
                --component "${component}" \
                --retag-from-namespace "${from_namespace}" \
                --push \
                --no-manifest-publish
            done
          }

          built_namespace=""
          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            publish_runtime "${GHCR_NAMESPACE}" "namespace-component"
            built_namespace="${GHCR_NAMESPACE}"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            if [ -n "${built_namespace}" ]; then
              retag_runtime_to_harbor "${built_namespace}" "namespace-component"
            else
              publish_runtime "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
            fi
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_runtime_arm64:
    needs: prepare
    if: needs.prepare.outputs.build_arm64 == 'true'
    runs-on: [self-hosted, linux, homelab, arm64]
    concurrency:
      group: harbor-dockerhub-${{ github.repository }}
      cancel-in-progress: false
    env:
      HARBOR_BUILD_TMP_PARENT: /var/lib/gha-runner-engine-build
      HARBOR_RETRY_MAX: "8"
      HARBOR_RETRY_INITIAL_DELAY: "60"
      HARBOR_REQUIRE_DOCKERHUB_LOGIN: "1"

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Require Docker Hub credentials
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_PASSWORD }}" ]; then
            echo "::error::Add repository secrets DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD (free Docker Hub account). Harbor pulls photon:5.0, golang, and node from Docker Hub to build swagger/photon images before compile."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push full Harbor runtime set (ARM64, sequential)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail
          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          runtime_components=(
            harbor-core harbor-portal harbor-jobservice harbor-registryctl harbor-db
            harbor-registry-photon harbor-redis-photon harbor-nginx-photon harbor-log
            harbor-trivy-adapter-photon harbor-exporter harbor-prepare
          )

          publish_runtime() {
            local namespace="$1"
            local path_mode="$2"
            applications/harbor/scripts/build-multiarch.sh \
              --namespace "${namespace}" \
              --tag "${{ needs.prepare.outputs.version }}" \
              --path-mode "${path_mode}" \
              --platforms linux/arm64 \
              --push \
              --no-manifest-publish
          }

          retag_runtime_to_harbor() {
            local from_namespace="$1"
            local path_mode="$2"
            local component
            for component in "${runtime_components[@]}"; do
              applications/harbor/scripts/build-multiarch.sh \
                --namespace "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" \
                --tag "${{ needs.prepare.outputs.version }}" \
                --path-mode "${path_mode}" \
                --platforms linux/arm64 \
                --component "${component}" \
                --retag-from-namespace "${from_namespace}" \
                --push \
                --no-manifest-publish
            done
          }

          built_namespace=""
          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            publish_runtime "${GHCR_NAMESPACE}" "namespace-component"
            built_namespace="${GHCR_NAMESPACE}"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            if [ -n "${built_namespace}" ]; then
              retag_runtime_to_harbor "${built_namespace}" "namespace-component"
            else
              publish_runtime "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
            fi
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  publish_manifest:
    needs:
      - prepare
      - build_runtime_amd64
      - build_runtime_arm64
    if: >
      always() &&
      needs.build_runtime_amd64.result != 'failure' &&
      needs.build_runtime_amd64.result != 'cancelled' &&
      needs.build_runtime_arm64.result != 'failure' &&
      needs.build_runtime_arm64.result != 'cancelled'
    runs-on: [self-hosted, linux, homelab, build]

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Publish Harbor runtime multi-arch manifests
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          set -euo pipefail

          chmod 0755 applications/harbor/scripts/build-multiarch.sh

          publish_manifests() {
            local namespace="$1"
            local path_mode="$2"

            applications/harbor/scripts/build-multiarch.sh \
              --manifest-only \
              --namespace "${namespace}" \
              --tag "${{ needs.prepare.outputs.version }}" \
              --path-mode "${path_mode}" \
              --platforms "${{ needs.prepare.outputs.platforms }}"
          }

          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            publish_manifests "${GHCR_NAMESPACE}" "namespace-component"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            publish_manifests "${HARBOR_REGISTRY}/${HARBOR_PROJECT}" "namespace-component"
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

name: Docker - Build and Push Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
      target_registry:
        description: "Registry target for this publish"
        required: true
        default: both
        type: choice
        options:
          - both
          - github
          - harbor
      build_platforms:
        description: "Architectures to build"
        required: true
        default: both
        type: choice
        options:
          - both
          - amd64
          - arm64
      build_target:
        description: "Build target"
        required: true
        default: cloud-image-repository
        type: choice
        options:
          - cloud-image-repository
          - gha-runner
          - jenkins-agent
          - jenkins-controller
          - langchain-agent-chat
          - langgraph
          - mcp-argocd
          - mcp-atlassian
          - mcp-cloudflare
          - mcp-fortigate
          - mcp-github
          - mcp-google-workspace
          - mcp-rag
          - mcp-terraform
          - rag-engine

permissions:
  contents: write
  packages: write

env:
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  HARBOR_REGISTRY: harbor.nodadyoushutup.com
  # Single Harbor project for all homelab images: <registry>/<HARBOR_PROJECT>/<repo>:<tag>
  HARBOR_PROJECT: homelab

jobs:
  prepare:
    # Arch-agnostic: checkout + bash only. Use shared `build` label so arm64 can run when amd64 is down.
    runs-on: [self-hosted, linux, homelab, build]
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_registry: ${{ steps.prepare.outputs.target_registry }}
      publish_github: ${{ steps.prepare.outputs.publish_github }}
      publish_harbor: ${{ steps.prepare.outputs.publish_harbor }}
      build_strategy: ${{ steps.prepare.outputs.build_strategy }}
      ghcr_image_base: ${{ steps.prepare.outputs.ghcr_image_base }}
      harbor_image_base: ${{ steps.prepare.outputs.harbor_image_base }}
      image_name: ${{ steps.prepare.outputs.image_name }}
      docker_context: ${{ steps.prepare.outputs.docker_context }}
      dockerfile: ${{ steps.prepare.outputs.dockerfile }}
      platforms: ${{ steps.prepare.outputs.platforms }}
      build_amd64: ${{ steps.prepare.outputs.build_amd64 }}
      build_arm64: ${{ steps.prepare.outputs.build_arm64 }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Prepare build parameters
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          version="${{ github.event.inputs.version }}"
          target_registry="${{ github.event.inputs.target_registry }}"
          build_target="${{ github.event.inputs.build_target }}"
          requested_platforms="${{ github.event.inputs.build_platforms }}"
          supported_platforms="linux/amd64,linux/arm64"
          publish_github=false
          publish_harbor=false

          if [ -z "$version" ]; then
            echo "Version could not be determined" >&2
            exit 1
          fi

          case "$build_target" in
            cloud-image-repository)
              image_name="cloud-image-repository"
              docker_context="applications/cloud-image-repository"
              build_strategy="direct"
              ;;
            gha-runner)
              image_name="gha-runner"
              docker_context="."
              dockerfile="applications/gha-runner/Dockerfile"
              build_strategy="direct"
              ;;
            jenkins-agent)
              image_name="jenkins-agent"
              docker_context="."
              dockerfile="applications/jenkins-agent/Dockerfile"
              build_strategy="direct"
              ;;
            jenkins-controller)
              image_name="jenkins-controller"
              docker_context="."
              dockerfile="applications/jenkins-controller/Dockerfile"
              build_strategy="direct"
              ;;
            langchain-agent-chat)
              image_name="langchain-agent-chat"
              docker_context="applications/langchain-agent-chat"
              supported_platforms="linux/amd64"
              build_strategy="direct"
              ;;
            langgraph)
              image_name="langgraph"
              docker_context="."
              dockerfile="applications/langgraph/docker/Dockerfile"
              supported_platforms="linux/amd64"
              build_strategy="direct"
              ;;
            mcp-argocd)
              image_name="mcp-argocd"
              docker_context="applications/mcp-argocd"
              build_strategy="direct"
              ;;
            mcp-atlassian)
              image_name="mcp-atlassian"
              docker_context="applications/mcp-atlassian"
              build_strategy="direct"
              ;;
            mcp-cloudflare)
              image_name="mcp-cloudflare"
              docker_context="applications/mcp-cloudflare"
              build_strategy="direct"
              ;;
            mcp-fortigate)
              image_name="mcp-fortigate"
              docker_context="applications/mcp-fortigate"
              build_strategy="direct"
              ;;
            mcp-github)
              image_name="mcp-github"
              docker_context="applications/mcp-github"
              build_strategy="direct"
              ;;
            mcp-google-workspace)
              image_name="mcp-google-workspace"
              docker_context="applications/mcp-google-workspace"
              build_strategy="direct"
              ;;
            mcp-rag)
              image_name="mcp-rag"
              docker_context="applications/mcp-rag"
              build_strategy="direct"
              ;;
            mcp-terraform)
              image_name="mcp-terraform"
              docker_context="applications/mcp-terraform"
              build_strategy="direct"
              ;;
            rag-engine)
              image_name="rag-engine"
              docker_context="applications/rag-engine"
              build_strategy="direct"
              ;;
            *)
              echo "Unsupported build target: $build_target" >&2
              exit 1
              ;;
          esac

          if [ "${build_strategy}" = "direct" ]; then
            dockerfile="${dockerfile:-${docker_context}/Dockerfile}"

            if [ ! -f "$dockerfile" ]; then
              echo "Dockerfile not found: $dockerfile" >&2
              exit 1
            fi
          fi

          case "$target_registry" in
            both)
              publish_github=true
              publish_harbor=true
              ;;
            github)
              publish_github=true
              ;;
            harbor)
              publish_harbor=true
              ;;
            *)
              echo "Unsupported target_registry: $target_registry" >&2
              exit 1
              ;;
          esac

          dockerfile="${dockerfile:-}"
          ghcr_image_base=""
          harbor_image_base=""

          if [ "${build_strategy}" = "direct" ]; then
            if [ "${publish_github}" = "true" ]; then
              ghcr_image_base="${GHCR_NAMESPACE}/${image_name}"
            fi

            if [ "${publish_harbor}" = "true" ]; then
              harbor_image_base="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${image_name}"
            fi
          fi

          case "$requested_platforms" in
            both)
              requested_platforms_csv="linux/amd64,linux/arm64"
              ;;
            amd64)
              requested_platforms_csv="linux/amd64"
              ;;
            arm64)
              requested_platforms_csv="linux/arm64"
              ;;
            *)
              echo "Unsupported build_platforms selection: $requested_platforms" >&2
              exit 1
              ;;
          esac

          filtered_platforms=()
          IFS=',' read -r -a supported_platform_list <<<"${supported_platforms}"
          for platform in "${supported_platform_list[@]}"; do
            [ -n "$platform" ] || continue

            case ",${requested_platforms_csv}," in
              *,"${platform}",*)
                filtered_platforms+=("${platform}")
                ;;
            esac
          done

          if [ "${#filtered_platforms[@]}" -eq 0 ]; then
            echo "Build target ${build_target} does not support requested build_platforms=${requested_platforms}." >&2
            exit 1
          fi

          platforms="$(IFS=,; echo "${filtered_platforms[*]}")"

          build_amd64=false
          build_arm64=false
          IFS=',' read -r -a platform_list <<<"${platforms}"
          for platform in "${platform_list[@]}"; do
            [ -n "$platform" ] || continue

            case "$platform" in
              linux/amd64) build_amd64=true ;;
              linux/arm64) build_arm64=true ;;
            esac
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "target_registry=$target_registry" >> "$GITHUB_OUTPUT"
          echo "publish_github=$publish_github" >> "$GITHUB_OUTPUT"
          echo "publish_harbor=$publish_harbor" >> "$GITHUB_OUTPUT"
          echo "build_strategy=$build_strategy" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "docker_context=$docker_context" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"
          echo "build_amd64=$build_amd64" >> "$GITHUB_OUTPUT"
          echo "build_arm64=$build_arm64" >> "$GITHUB_OUTPUT"
          echo "ghcr_image_base=$ghcr_image_base" >> "$GITHUB_OUTPUT"
          echo "harbor_image_base=$harbor_image_base" >> "$GITHUB_OUTPUT"

          echo "::notice::Preparing native direct builds for ${platforms} from ${docker_context} using ${dockerfile} and target_registry=${target_registry}."

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_direct_amd64:
    needs: prepare
    if: needs.prepare.outputs.build_strategy == 'direct' && needs.prepare.outputs.build_amd64 == 'true'
    runs-on: [self-hosted, linux, homelab, amd64, build]

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push native AMD64 image
        shell: bash
        run: |
          set -euo pipefail

          image_refs=()
          tag_args=()

          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            image_ref="${{ needs.prepare.outputs.ghcr_image_base }}:${{ needs.prepare.outputs.version }}-amd64"
            image_refs+=("${image_ref}")
            tag_args+=(--tag "${image_ref}")
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            image_ref="${{ needs.prepare.outputs.harbor_image_base }}:${{ needs.prepare.outputs.version }}-amd64"
            image_refs+=("${image_ref}")
            tag_args+=(--tag "${image_ref}")
          fi

          if [ "${#image_refs[@]}" -eq 0 ]; then
            echo "No registry targets were prepared for this publish." >&2
            exit 1
          fi

          docker buildx build \
            --builder default \
            --platform linux/amd64 \
            --provenance=false \
            --file "${{ needs.prepare.outputs.dockerfile }}" \
            --load \
            "${tag_args[@]}" \
            "${{ needs.prepare.outputs.docker_context }}"

          for image_ref in "${image_refs[@]}"; do
            docker push "${image_ref}"
          done

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_direct_arm64:
    needs: prepare
    if: needs.prepare.outputs.build_strategy == 'direct' && needs.prepare.outputs.build_arm64 == 'true'
    runs-on: [self-hosted, linux, homelab, arm64]

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push native ARM64 image
        shell: bash
        run: |
          set -euo pipefail

          image_refs=()
          tag_args=()

          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            image_ref="${{ needs.prepare.outputs.ghcr_image_base }}:${{ needs.prepare.outputs.version }}-arm64"
            image_refs+=("${image_ref}")
            tag_args+=(--tag "${image_ref}")
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            image_ref="${{ needs.prepare.outputs.harbor_image_base }}:${{ needs.prepare.outputs.version }}-arm64"
            image_refs+=("${image_ref}")
            tag_args+=(--tag "${image_ref}")
          fi

          if [ "${#image_refs[@]}" -eq 0 ]; then
            echo "No registry targets were prepared for this publish." >&2
            exit 1
          fi

          docker buildx build \
            --builder default \
            --platform linux/arm64 \
            --provenance=false \
            --file "${{ needs.prepare.outputs.dockerfile }}" \
            --load \
            "${tag_args[@]}" \
            "${{ needs.prepare.outputs.docker_context }}"

          for image_ref in "${image_refs[@]}"; do
            docker push "${image_ref}"
          done

  publish_direct_manifest:
    needs:
      - prepare
      - build_direct_amd64
      - build_direct_arm64
    if: >
      always() &&
      needs.prepare.outputs.build_strategy == 'direct' &&
      needs.build_direct_amd64.result != 'failure' &&
      needs.build_direct_amd64.result != 'cancelled' &&
      needs.build_direct_arm64.result != 'failure' &&
      needs.build_direct_arm64.result != 'cancelled'
    runs-on: [self-hosted, linux, homelab, build]

    steps:
      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.publish_github == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Harbor credentials
        if: needs.prepare.outputs.publish_harbor == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_ROBOT_USERNAME and HARBOR_ROBOT_SECRET are required for Harbor publishes." >&2
            exit 1
          fi

      - name: Log in to Harbor Registry
        if: needs.prepare.outputs.publish_harbor == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Publish version and latest manifest tags
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.prepare.outputs.version }}"

          publish_manifest_tags() {
            local image_base="$1"
            local refs=()
            local ref arch

            if [ "${{ needs.prepare.outputs.build_amd64 }}" = "true" ]; then
              refs+=("${image_base}:${version}-amd64")
            fi

            if [ "${{ needs.prepare.outputs.build_arm64 }}" = "true" ]; then
              refs+=("${image_base}:${version}-arm64")
            fi

            if [ "${#refs[@]}" -eq 0 ]; then
              echo "No per-architecture image refs were prepared for manifest publish." >&2
              exit 1
            fi

            docker manifest rm "${image_base}:${version}" >/dev/null 2>&1 || true
            docker manifest create "${image_base}:${version}" "${refs[@]}"

            docker manifest rm "${image_base}:latest" >/dev/null 2>&1 || true
            docker manifest create "${image_base}:latest" "${refs[@]}"

            for ref in "${refs[@]}"; do
              arch="${ref##*-}"
              docker manifest annotate "${image_base}:${version}" "${ref}" --os linux --arch "${arch}"
              docker manifest annotate "${image_base}:latest" "${ref}" --os linux --arch "${arch}"
            done

            docker manifest push "${image_base}:${version}"
            docker manifest push "${image_base}:latest"
          }

          if [ "${{ needs.prepare.outputs.publish_github }}" = "true" ]; then
            publish_manifest_tags "${{ needs.prepare.outputs.ghcr_image_base }}"
          fi

          if [ "${{ needs.prepare.outputs.publish_harbor }}" = "true" ]; then
            publish_manifest_tags "${{ needs.prepare.outputs.harbor_image_base }}"
          fi

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        run: |
          set +e
          echo "=== Docker cleanup (post-job, self-hosted) ==="
          docker container prune -f
          docker builder prune -af
          docker image prune -af
          docker system df || true
          df -h / || true

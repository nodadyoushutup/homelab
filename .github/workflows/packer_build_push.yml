name: Packer - Build and Push Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version to build (e.g. 0.0.3)"
        required: true
      target:
        description: "Publish target"
        required: true
        type: choice
        default: webserver
        options:
          - webserver
      amd64_accelerator:
        description: "AMD64 QEMU accelerator"
        required: true
        type: choice
        default: kvm
        options:
          - kvm
          - tcg
          - none
      arm64_accelerator:
        description: "ARM64 QEMU accelerator"
        required: true
        type: choice
        default: kvm
        options:
          - kvm
          - tcg
          - none
      build_arch:
        description: "Architecture to build"
        required: true
        type: choice
        default: amd64
        options:
          - amd64
          - arm64
          - both

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, linux, homelab]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      upload_base_url: ${{ steps.target.outputs.upload_base_url }}
      upload_fallback_base_url: ${{ steps.target.outputs.upload_fallback_base_url }}
    env:
      VERSION: ${{ github.event.inputs.version }}
      AMD64_ACCELERATOR: ${{ github.event.inputs.amd64_accelerator }}
      ARM64_ACCELERATOR: ${{ github.event.inputs.arm64_accelerator }}
      BUILD_ARCH: ${{ github.event.inputs.build_arch }}
      PACKER_DIR: packer
      PACKER_TEMPLATE: packer/ubuntu-24.04-ndysu.pkr.hcl
      PACKER_OUTPUT_DIR: packer/output/ubuntu-24.04-ndysu/${{ github.event.inputs.version }}
      MAX_UPLOAD_BYTES: "26843545600" # 25 GiB
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Prepare workflow metadata
        id: meta
        run: |
          set -euo pipefail
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=packer-qcow2-${VERSION}-${BUILD_ARCH}" >> "$GITHUB_OUTPUT"

      - name: Resolve publish target
        id: target
        run: |
          set -euo pipefail

          target="${{ github.event.inputs.target }}"
          case "$target" in
            webserver)
              upload_base_url="https://webserver.image.nodadyoushutup.com"
              upload_fallback_base_url="http://192.168.1.120:18088"
              ;;
            *)
              echo "Unsupported target: $target" >&2
              exit 1
              ;;
          esac

          echo "upload_base_url=${upload_base_url}" >> "$GITHUB_OUTPUT"
          echo "upload_fallback_base_url=${upload_fallback_base_url}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved packer target '${target}' -> ${upload_base_url}"

      - name: Validate toolchain
        run: |
          set -euo pipefail
          command -v packer >/dev/null 2>&1
          command -v xorriso >/dev/null 2>&1
          command -v qemu-img >/dev/null 2>&1
          if [[ "${BUILD_ARCH}" == "amd64" || "${BUILD_ARCH}" == "both" ]]; then
            command -v qemu-system-x86_64 >/dev/null 2>&1
          fi
          if [[ "${BUILD_ARCH}" == "arm64" || "${BUILD_ARCH}" == "both" ]]; then
            command -v qemu-system-aarch64 >/dev/null 2>&1
          fi
          command -v curl >/dev/null 2>&1
          command -v jq >/dev/null 2>&1

      - name: Build stage - Packer image artifacts
        run: |
          set -euo pipefail
          [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid version '${VERSION}'. Expected semantic version like 0.0.1." >&2
            exit 1
          }
          [[ "${AMD64_ACCELERATOR}" == "kvm" || "${AMD64_ACCELERATOR}" == "tcg" || "${AMD64_ACCELERATOR}" == "none" ]] || {
            echo "Invalid accelerator '${AMD64_ACCELERATOR}'. Expected 'kvm', 'tcg', or 'none'." >&2
            exit 1
          }
          [[ "${ARM64_ACCELERATOR}" == "kvm" || "${ARM64_ACCELERATOR}" == "tcg" || "${ARM64_ACCELERATOR}" == "none" ]] || {
            echo "Invalid accelerator '${ARM64_ACCELERATOR}'. Expected 'kvm', 'tcg', or 'none'." >&2
            exit 1
          }
          [[ "${BUILD_ARCH}" == "amd64" || "${BUILD_ARCH}" == "arm64" || "${BUILD_ARCH}" == "both" ]] || {
            echo "Invalid build_arch '${BUILD_ARCH}'. Expected 'amd64', 'arm64', or 'both'." >&2
            exit 1
          }

          PACKER_ONLY_ARGS=()
          case "${BUILD_ARCH}" in
            amd64)
              PACKER_ONLY_ARGS=(-only=ubuntu-24.04-ndysu.qemu.ubuntu_24_04_amd64)
              ;;
            arm64)
              PACKER_ONLY_ARGS=(-only=ubuntu-24.04-ndysu.qemu.ubuntu_24_04_arm64)
              ;;
            both)
              ;;
          esac

          cd "${PACKER_DIR}"
          rm -rf "output/ubuntu-24.04-ndysu/${VERSION}"

          packer init "ubuntu-24.04-ndysu.pkr.hcl"
          packer fmt "ubuntu-24.04-ndysu.pkr.hcl"
          packer validate "${PACKER_ONLY_ARGS[@]}" -var "image_version=${VERSION}" -var "amd64_accelerator=${AMD64_ACCELERATOR}" -var "arm64_accelerator=${ARM64_ACCELERATOR}" "ubuntu-24.04-ndysu.pkr.hcl"
          packer build -force "${PACKER_ONLY_ARGS[@]}" -var "image_version=${VERSION}" -var "amd64_accelerator=${AMD64_ACCELERATOR}" -var "arm64_accelerator=${ARM64_ACCELERATOR}" "ubuntu-24.04-ndysu.pkr.hcl"

      - name: Verify qcow2 artifacts are present
        run: |
          set -euo pipefail

          mapfile -t artifacts < <(find "${PACKER_OUTPUT_DIR}" -type f -name '*.qcow2' | sort)
          [[ "${#artifacts[@]}" -gt 0 ]] || {
            echo "No qcow2 artifacts found under ${PACKER_OUTPUT_DIR}" >&2
            exit 1
          }

      - name: Upload qcow2 artifacts for push job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ env.PACKER_OUTPUT_DIR }}/**/*.qcow2
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: [self-hosted, linux, homelab]
    needs: build
    env:
      VERSION: ${{ needs.build.outputs.version }}
      PACKER_OUTPUT_DIR: packer/output/ubuntu-24.04-ndysu/${{ needs.build.outputs.version }}
      MAX_UPLOAD_BYTES: "26843545600" # 25 GiB
    defaults:
      run:
        shell: bash

    steps:
      - name: Download qcow2 artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ env.PACKER_OUTPUT_DIR }}

      - name: Validate upload toolchain
        run: |
          set -euo pipefail
          command -v curl >/dev/null 2>&1
          command -v stat >/dev/null 2>&1

      - name: Push stage - Upload qcow2 artifacts
        env:
          UPLOAD_BASE_URL: ${{ needs.build.outputs.upload_base_url }}
          UPLOAD_FALLBACK_BASE_URL: ${{ needs.build.outputs.upload_fallback_base_url }}
        run: |
          set -euo pipefail

          mapfile -t artifacts < <(find "${PACKER_OUTPUT_DIR}" -type f -name '*.qcow2' | sort)
          [[ "${#artifacts[@]}" -gt 0 ]] || {
            echo "No qcow2 artifacts found under ${PACKER_OUTPUT_DIR}" >&2
            exit 1
          }

          upload_artifact() {
            local artifact_path="$1"
            local url="$2"
            curl \
              --progress-bar \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --request PUT \
              --header "Content-Type: application/octet-stream" \
              --upload-file "${artifact_path}" \
              "${url}"
          }

          for artifact in "${artifacts[@]}"; do
            basename="$(basename "${artifact}")"
            bytes="$(stat -c '%s' "${artifact}")"

            if (( bytes > MAX_UPLOAD_BYTES )); then
              echo "Artifact ${basename} exceeds 25GiB upload limit." >&2
              exit 1
            fi

            target_url="${UPLOAD_BASE_URL}/${basename}"
            http_code="$(upload_artifact "${artifact}" "${target_url}")"

            if [[ "${http_code}" == "413" ]] && [[ -n "${UPLOAD_FALLBACK_BASE_URL}" ]]; then
              target_url="${UPLOAD_FALLBACK_BASE_URL}/${basename}"
              http_code="$(upload_artifact "${artifact}" "${target_url}")"
            fi

            case "${http_code}" in
              200|201|204)
                echo "::notice::Uploaded ${basename} -> ${target_url} (HTTP ${http_code})"
                ;;
              *)
                echo "Upload failed for ${basename}: HTTP ${http_code} (${target_url})" >&2
                exit 1
                ;;
            esac
          done

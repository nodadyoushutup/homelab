name: Packer - Build and Push Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version to build (e.g. 0.0.3)"
        required: true
      target:
        description: "Publish target"
        required: true
        type: choice
        default: cloud-image-repository
        options:
          - cloud-image-repository
      amd64_accelerator:
        description: "AMD64 QEMU accelerator"
        required: true
        type: choice
        default: kvm
        options:
          - kvm
          - tcg
          - none
      arm64_accelerator:
        description: "ARM64 QEMU accelerator"
        required: true
        type: choice
        default: kvm
        options:
          - kvm
          - tcg
          - none
      build_arch:
        description: "Architectures to build (native runner per arch; both = parallel jobs like Docker direct)"
        required: true
        type: choice
        default: both
        options:
          - amd64
          - arm64
          - both

permissions:
  contents: read

jobs:
  prepare:
    runs-on: [self-hosted, linux, homelab, amd64, build]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      upload_base_url: ${{ steps.target.outputs.upload_base_url }}
      upload_fallback_base_url: ${{ steps.target.outputs.upload_fallback_base_url }}
      build_amd64: ${{ steps.meta.outputs.build_amd64 }}
      build_arm64: ${{ steps.meta.outputs.build_arm64 }}
      amd64_accelerator: ${{ steps.meta.outputs.amd64_accelerator }}
      arm64_accelerator: ${{ steps.meta.outputs.arm64_accelerator }}

    env:
      VERSION: ${{ github.event.inputs.version }}
      AMD64_ACCELERATOR: ${{ github.event.inputs.amd64_accelerator }}
      ARM64_ACCELERATOR: ${{ github.event.inputs.arm64_accelerator }}
      BUILD_ARCH: ${{ github.event.inputs.build_arch }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Prepare workflow metadata
        id: meta
        run: |
          set -euo pipefail
          [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid version '${VERSION}'. Expected semantic version like 0.0.1." >&2
            exit 1
          }
          [[ "${AMD64_ACCELERATOR}" == "kvm" || "${AMD64_ACCELERATOR}" == "tcg" || "${AMD64_ACCELERATOR}" == "none" ]] || {
            echo "Invalid accelerator '${AMD64_ACCELERATOR}'. Expected 'kvm', 'tcg', or 'none'." >&2
            exit 1
          }
          [[ "${ARM64_ACCELERATOR}" == "kvm" || "${ARM64_ACCELERATOR}" == "tcg" || "${ARM64_ACCELERATOR}" == "none" ]] || {
            echo "Invalid accelerator '${ARM64_ACCELERATOR}'. Expected 'kvm', 'tcg', or 'none'." >&2
            exit 1
          }
          [[ "${BUILD_ARCH}" == "amd64" || "${BUILD_ARCH}" == "arm64" || "${BUILD_ARCH}" == "both" ]] || {
            echo "Invalid build_arch '${BUILD_ARCH}'. Expected 'amd64', 'arm64', or 'both'." >&2
            exit 1
          }

          build_amd64=false
          build_arm64=false
          case "${BUILD_ARCH}" in
            amd64) build_amd64=true ;;
            arm64) build_arm64=true ;;
            both)
              build_amd64=true
              build_arm64=true
              ;;
          esac

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_amd64=${build_amd64}" >> "$GITHUB_OUTPUT"
          echo "build_arm64=${build_arm64}" >> "$GITHUB_OUTPUT"
          echo "amd64_accelerator=${AMD64_ACCELERATOR}" >> "$GITHUB_OUTPUT"
          echo "arm64_accelerator=${ARM64_ACCELERATOR}" >> "$GITHUB_OUTPUT"

          echo "::notice::Packer direct builds: amd64=${build_amd64} arm64=${build_arm64} (dispatch build_arch=${BUILD_ARCH})"

      - name: Resolve publish target
        id: target
        run: |
          set -euo pipefail

          target="${{ github.event.inputs.target }}"
          case "$target" in
            cloud-image-repository)
              upload_base_url="https://cloud-image-repository.image.nodadyoushutup.com"
              upload_fallback_base_url="http://192.168.1.120:18088"
              ;;
            *)
              echo "Unsupported target: $target" >&2
              exit 1
              ;;
          esac

          echo "upload_base_url=${upload_base_url}" >> "$GITHUB_OUTPUT"
          echo "upload_fallback_base_url=${upload_fallback_base_url}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved packer target '${target}' -> ${upload_base_url}"

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  # Same shape as Docker "direct" path: prepare → parallel per-arch jobs → publish.
  # GitHub does not allow `matrix.*` in job-level `if`, so we use two jobs (like build_direct_amd64 / build_direct_arm64).
  build_packer_direct_amd64:
    name: build_packer_direct_amd64
    needs: prepare
    if: needs.prepare.outputs.build_amd64 == 'true'
    runs-on: [self-hosted, linux, homelab, amd64, build, kvm]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      AMD64_ACCELERATOR: ${{ needs.prepare.outputs.amd64_accelerator }}
      ARM64_ACCELERATOR: ${{ needs.prepare.outputs.arm64_accelerator }}
      PACKER_DIR: packer
      PACKER_OUTPUT_DIR: packer/output/ubuntu-24.04-ndysu/${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Validate toolchain
        run: |
          set -euo pipefail
          command -v packer >/dev/null 2>&1
          command -v xorriso >/dev/null 2>&1
          command -v qemu-img >/dev/null 2>&1
          command -v qemu-system-x86_64 >/dev/null 2>&1
          command -v curl >/dev/null 2>&1
          command -v jq >/dev/null 2>&1

      # Docker-based self-hosted runners often omit /dev/kvm; QEMU then dies with "Error launching VM".
      - name: Fallback AMD64 kvm to tcg when /dev/kvm is unusable
        run: |
          set -euo pipefail
          if [[ "${AMD64_ACCELERATOR}" != "kvm" ]]; then
            exit 0
          fi
          if [[ -e /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]; then
            exit 0
          fi
          echo "AMD64_ACCELERATOR=tcg" >> "${GITHUB_ENV}"
          echo "::warning::AMD64 kvm was requested but /dev/kvm is missing or not readable/writable (typical in unprivileged runner containers). Using tcg; expect slower builds. For kvm, pass /dev/kvm into the runner or dispatch with amd64_accelerator tcg."

      - name: Build Packer image (amd64)
        run: |
          set -euo pipefail
          PACKER_ONLY_ARGS=(-only=ubuntu-24.04-ndysu.qemu.ubuntu_24_04_amd64)

          cd "${PACKER_DIR}"
          rm -rf "output/ubuntu-24.04-ndysu/${VERSION}"

          packer init "ubuntu-24.04-ndysu.pkr.hcl"
          packer fmt "ubuntu-24.04-ndysu.pkr.hcl"
          packer validate "${PACKER_ONLY_ARGS[@]}" \
            -var "image_version=${VERSION}" \
            -var "amd64_accelerator=${AMD64_ACCELERATOR}" \
            -var "arm64_accelerator=${ARM64_ACCELERATOR}" \
            "ubuntu-24.04-ndysu.pkr.hcl"
          packer build -force "${PACKER_ONLY_ARGS[@]}" \
            -var "image_version=${VERSION}" \
            -var "amd64_accelerator=${AMD64_ACCELERATOR}" \
            -var "arm64_accelerator=${ARM64_ACCELERATOR}" \
            "ubuntu-24.04-ndysu.pkr.hcl"

      - name: Verify qcow2 artifact is present
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find "${PACKER_OUTPUT_DIR}" -type f -name '*.qcow2' | sort)
          [[ "${#artifacts[@]}" -gt 0 ]] || {
            echo "No qcow2 artifacts found under ${PACKER_OUTPUT_DIR}" >&2
            exit 1
          }

      - name: Upload qcow2 for publish job
        uses: actions/upload-artifact@v4
        with:
          name: packer-qcow2-${{ needs.prepare.outputs.version }}-amd64
          path: ${{ env.PACKER_OUTPUT_DIR }}/**/*.qcow2
          if-no-files-found: error
          retention-days: 1

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  build_packer_direct_arm64:
    name: build_packer_direct_arm64
    needs: prepare
    if: needs.prepare.outputs.build_arm64 == 'true'
    runs-on: [self-hosted, linux, homelab, arm64, build, kvm]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      AMD64_ACCELERATOR: ${{ needs.prepare.outputs.amd64_accelerator }}
      ARM64_ACCELERATOR: ${{ needs.prepare.outputs.arm64_accelerator }}
      PACKER_DIR: packer
      PACKER_OUTPUT_DIR: packer/output/ubuntu-24.04-ndysu/${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Validate toolchain
        run: |
          set -euo pipefail
          command -v packer >/dev/null 2>&1
          command -v xorriso >/dev/null 2>&1
          command -v qemu-img >/dev/null 2>&1
          command -v qemu-system-aarch64 >/dev/null 2>&1
          command -v curl >/dev/null 2>&1
          command -v jq >/dev/null 2>&1

      - name: Fallback ARM64 kvm to tcg when /dev/kvm is unusable
        run: |
          set -euo pipefail
          if [[ "${ARM64_ACCELERATOR}" != "kvm" ]]; then
            exit 0
          fi
          if [[ -e /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]; then
            exit 0
          fi
          echo "ARM64_ACCELERATOR=tcg" >> "${GITHUB_ENV}"
          echo "::warning::ARM64 kvm was requested but /dev/kvm is missing or not readable/writable. Using tcg; expect slower builds."

      - name: Build Packer image (arm64)
        run: |
          set -euo pipefail
          PACKER_ONLY_ARGS=(-only=ubuntu-24.04-ndysu.qemu.ubuntu_24_04_arm64)

          cd "${PACKER_DIR}"
          rm -rf "output/ubuntu-24.04-ndysu/${VERSION}"

          packer init "ubuntu-24.04-ndysu.pkr.hcl"
          packer fmt "ubuntu-24.04-ndysu.pkr.hcl"
          packer validate "${PACKER_ONLY_ARGS[@]}" \
            -var "image_version=${VERSION}" \
            -var "amd64_accelerator=${AMD64_ACCELERATOR}" \
            -var "arm64_accelerator=${ARM64_ACCELERATOR}" \
            "ubuntu-24.04-ndysu.pkr.hcl"
          packer build -force "${PACKER_ONLY_ARGS[@]}" \
            -var "image_version=${VERSION}" \
            -var "amd64_accelerator=${AMD64_ACCELERATOR}" \
            -var "arm64_accelerator=${ARM64_ACCELERATOR}" \
            "ubuntu-24.04-ndysu.pkr.hcl"

      - name: Verify qcow2 artifact is present
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find "${PACKER_OUTPUT_DIR}" -type f -name '*.qcow2' | sort)
          [[ "${#artifacts[@]}" -gt 0 ]] || {
            echo "No qcow2 artifacts found under ${PACKER_OUTPUT_DIR}" >&2
            exit 1
          }

      - name: Upload qcow2 for publish job
        uses: actions/upload-artifact@v4
        with:
          name: packer-qcow2-${{ needs.prepare.outputs.version }}-arm64
          path: ${{ env.PACKER_OUTPUT_DIR }}/**/*.qcow2
          if-no-files-found: error
          retention-days: 1

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

  publish_packer_artifacts:
    name: publish_packer_artifacts
    needs:
      - prepare
      - build_packer_direct_amd64
      - build_packer_direct_arm64
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      needs.build_packer_direct_amd64.result != 'failure' &&
      needs.build_packer_direct_amd64.result != 'cancelled' &&
      needs.build_packer_direct_arm64.result != 'failure' &&
      needs.build_packer_direct_arm64.result != 'cancelled'
    runs-on: [self-hosted, linux, homelab, amd64, build]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      MAX_UPLOAD_BYTES: "26843545600" # 25 GiB
    defaults:
      run:
        shell: bash

    steps:
      - name: Download qcow2 artifacts from build jobs
        uses: actions/download-artifact@v4
        with:
          pattern: packer-qcow2-${{ needs.prepare.outputs.version }}-*
          merge-multiple: true
          path: packer-artifacts

      - name: Validate upload toolchain
        run: |
          set -euo pipefail
          command -v curl >/dev/null 2>&1
          command -v stat >/dev/null 2>&1

      - name: Publish qcow2 artifacts to cloud image repository host
        env:
          UPLOAD_BASE_URL: ${{ needs.prepare.outputs.upload_base_url }}
          UPLOAD_FALLBACK_BASE_URL: ${{ needs.prepare.outputs.upload_fallback_base_url }}
        run: |
          set -euo pipefail

          mapfile -t artifacts < <(find packer-artifacts -type f -name '*.qcow2' | sort)
          [[ "${#artifacts[@]}" -gt 0 ]] || {
            echo "No qcow2 artifacts found under packer-artifacts" >&2
            exit 1
          }

          upload_artifact() {
            local artifact_path="$1"
            local url="$2"
            curl \
              --progress-bar \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --request PUT \
              --header "Content-Type: application/octet-stream" \
              --upload-file "${artifact_path}" \
              "${url}"
          }

          for artifact in "${artifacts[@]}"; do
            basename="$(basename "${artifact}")"
            bytes="$(stat -c '%s' "${artifact}")"

            if (( bytes > MAX_UPLOAD_BYTES )); then
              echo "Artifact ${basename} exceeds 25GiB upload limit." >&2
              exit 1
            fi

            target_url="${UPLOAD_BASE_URL}/${basename}"
            http_code="$(upload_artifact "${artifact}" "${target_url}")"

            if [[ "${http_code}" == "413" ]] && [[ -n "${UPLOAD_FALLBACK_BASE_URL}" ]]; then
              target_url="${UPLOAD_FALLBACK_BASE_URL}/${basename}"
              http_code="$(upload_artifact "${artifact}" "${target_url}")"
            fi

            case "${http_code}" in
              200|201|204)
                echo "::notice::Uploaded ${basename} -> ${target_url} (HTTP ${http_code})"
                ;;
              *)
                echo "Upload failed for ${basename}: HTTP ${http_code} (${target_url})" >&2
                exit 1
                ;;
            esac
          done

      - name: Post-job Docker cleanup (self-hosted disk)
        if: always()
        uses: ./.github/actions/docker-selfhosted-cleanup

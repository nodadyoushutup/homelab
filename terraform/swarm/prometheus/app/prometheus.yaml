global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: node_exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - 192.168.1.26:9100 # swarm-cp-0
          - 192.168.1.28:9100 # swarm-wk-0
          - 192.168.1.25:9100 # swarm-wk-1
          - 192.168.1.23:9100 # swarm-wk-2
          - 192.168.1.22:9100 # swarm-wk-3
          - 192.168.1.24:9100 # swarm-wk-4
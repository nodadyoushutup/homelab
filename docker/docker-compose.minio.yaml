# MINIO_* live in <repo>/.secrets/.env (see .secrets/.env.example).
# From docker/: docker compose -f docker-compose.minio.yaml up -d
name: minio

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z # pinned for admin console
    container_name: minio
    restart: unless-stopped
    env_file:
      - ../.secrets/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    command: ["server", "/data", "--console-address=:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  minio-data:
  minio-config:

name: homelab-dev

services:
  # RAG dev pair: bind-mounted application code (like langgraph-dev). Agent Chat is the baked `runner`
  # image (no source bind mount); rebuild when UI changes.
  # Restart rag-engine-dev / mcp-rag-dev after edits; rebuild images only when Dockerfile or requirements change.
  # Chroma stays on Swarm — `environment` overrides RAG_CHROMA_* from .config/.env so a Swarm hostname like
  # `chromadb` does not break Compose (see docs/rag/operators-and-clients.md).
  # Override: export HOMELAB_DEV_CHROMA_HOST=... HOMELAB_DEV_CHROMA_PORT=... before `docker compose up`.
  rag-engine-dev:
    image: homelab/rag-engine:latest
    pull_policy: never
    build:
      context: ../applications/rag-engine
      dockerfile: Dockerfile
    env_file:
      - ../.config/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      RAG_CHROMA_HOST: ${HOMELAB_DEV_CHROMA_HOST:-192.168.1.120}
      RAG_CHROMA_PORT: ${HOMELAB_DEV_CHROMA_PORT:-8000}
    # Pin entrypoint so a stale local image (old CMD like `rag_engine.server:app`) still matches current src.
    command:
      [
        "uvicorn",
        "api.server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    ports:
      - "9015:8080"
    volumes:
      - ../applications/rag-engine/src:/app/src
    healthcheck:
      # Do not rely on image `rag-engine-healthcheck` (older images called `rag_engine.healthcheck`).
      test: ["CMD", "python", "-m", "api.healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  mcp-rag-dev:
    image: homelab/mcp-rag:latest
    pull_policy: never
    build:
      context: ../applications/mcp-rag
      dockerfile: Dockerfile
    env_file:
      - ../.config/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      RAG_ENGINE_BASE_URL: http://rag-engine-dev:8080
    depends_on:
      rag-engine-dev:
        condition: service_healthy
    ports:
      - "9016:8080"
    volumes:
      - ../applications/mcp-rag/src:/app/src
    healthcheck:
      test: ["CMD", "mcp-rag", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  # mcp-code: HTTP aggregate on :8100; server.py merges three stdio MCP children (opt-in native: MCP_CODE_USE_NATIVE=1; opt-in http+mcp-proxy: MCP_CODE_UPSTREAM_TRANSPORT=http).
  # Mount the homelab tree at the same path as Swarm/NFS (/mnt/eapp/code/homelab) so filesystem, git, and ast-grep agree on roots.
  # Set HOMELAB_MCP_CODE_HOST_MOUNT in .config/.env (see .config/.env.example); pass --env-file .config/.env when running compose from repo root.
  mcp-code-dev:
    image: homelab/mcp-code:latest
    pull_policy: never
    build:
      context: ..
      dockerfile: applications/mcp-code/Dockerfile
    env_file:
      - ../.config/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      MCP_CODE_WORKSPACE_ROOT: /mnt/eapp/code/homelab
      MCP_CODE_HOST: 0.0.0.0
      MCP_CODE_PORT: "8100"
      MCP_HTTP_PATH: /mcp
      AST_GREP_CONFIG: /opt/ast-grep-config/sgconfig.yml
      AST_GREP_DEFAULT_PROJECT_ROOT: /mnt/eapp/code/homelab
      AST_GREP_ALLOWED_ROOTS: /mnt/eapp/code/homelab
    user: "1000:1000"
    ports:
      - "${MCP_CODE_DEV_PUBLISH_PORT:-9017}:8100"
    volumes:
      - ${HOMELAB_MCP_CODE_HOST_MOUNT:-/mnt/eapp/code/homelab}:/mnt/eapp/code/homelab:rw
      - ../applications/mcp-code/src/mcp_code:/opt/mcp-code/mcp_code:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mcp-code-venv/bin/python -c \"import socket; s=socket.create_connection(('127.0.0.1',8100),2); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      # Outer listener binds immediately; upstream merge warms in background.
      start_period: 15s

  langgraph-postgres:
    image: postgres:17-alpine
    env_file:
      - ../.config/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # Named volume: Docker chowns PGDATA to uid 70; bind mounts often fail on NFS/root_squash.
      - langgraph_postgres_data:/var/lib/postgresql/data

  langgraph-dev:
    image: homelab/langgraph:latest
    pull_policy: never
    build:
      context: ../applications/langgraph
      dockerfile: docker/Dockerfile
    # Override stale image WorkingDir (e.g. /app/langgraph/apps/...): the OCI
    # runtime mkdirs cwd on start; NFS root_squash makes that fail for root.
    working_dir: /app/langgraph/agent
    env_file:
      - ../.config/.env
    depends_on:
      langgraph-postgres:
        condition: service_healthy
      mcp-rag-dev:
        condition: service_healthy
      mcp-code-dev:
        condition: service_healthy
    environment:
      HOMELAB_REPO_ROOT: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_NO_CACHE_DIR: "1"
      # Same homelab tree as mcp-code-dev (NFS path inside the container) for MCP path normalization.
      CODE_REPOSITORY_ROOT: /mnt/eapp/code/homelab
      TECH_LEAD_REPOSITORY_ROOT: /mnt/eapp/code/homelab
      # Centralized `.config/.env` for `framework.configuration.merged_settings` / assert paths.
      # Default matches the standard bind mount; override with HOMELAB_CONFIG_ENV in .env if the repo root differs.
      HOMELAB_CONFIG_ENV: ${HOMELAB_CONFIG_ENV:-${HOMELAB_SECRETS_ENV:-/mnt/eapp/code/homelab/.config/.env}}
      # MCP HTTP URLs: set in `.config/.env` for LangGraph `mcp.json` `url_from_env` resolution; defaults are Compose service DNS + LAN Swarm MCP (see .config/.env.example).
      HOMELAB_MCP_RAG_URL: ${HOMELAB_MCP_RAG_URL:-http://mcp-rag-dev:8080/mcp}
      HOMELAB_MCP_CODE_URL: ${HOMELAB_MCP_CODE_URL:-http://mcp-code-dev:8100/mcp}
      HOMELAB_MCP_GITHUB_URL: ${HOMELAB_MCP_GITHUB_URL:-http://192.168.1.120:18208/mcp}
      HOMELAB_MCP_ATLASSIAN_URL: ${HOMELAB_MCP_ATLASSIAN_URL:-http://192.168.1.120:18200/mcp}
    ports:
      - "2124:2024"
    volumes:
      - ../applications/langgraph:/app/langgraph
      - ../docs:/app/docs:ro
      # Named volume: in-memory runtime persists pickle checkpoints; bind mounts often deny writes
      # when the repo is on NFS (root_squash) or host uid does not match the container process.
      - langgraph_state:/app/langgraph/agent/.langgraph_api
      - ${HOMELAB_MCP_CODE_HOST_MOUNT:-/mnt/eapp/code/homelab}:/mnt/eapp/code/homelab:rw
    # Deep probe (DB + assistants + schemas + threads); first boot can be minutes on cold CPU / NFS.
    # start_period 360s: slow graph/MCP imports do not fail the service during this window.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "/usr/local/bin/langgraph_compose_healthcheck.py",
        ]
      interval: 15s
      timeout: 60s
      retries: 24
      start_period: 360s

  langchain-agent-chat-dev:
    # Port 3000 stays CLOSED until langgraph-dev is **healthy** (not merely started). `ps` may show
    # this service as "Created" for ~1–3 min warm, often ~3–6 min cold; if it never leaves Created,
    # fix LangGraph (logs) — Swarm MCP / Chroma / DB — not the chat image.
    # Proxy/UI for LangGraph — do not start until LangGraph is actually serving (not only "container up").
    depends_on:
      langgraph-dev:
        condition: service_healthy
    restart: unless-stopped
    image: homelab/langchain-agent-chat:latest
    pull_policy: never
    build:
      context: ../applications/langchain-agent-chat
      dockerfile: Dockerfile
      # Production `runner` image: `docker compose build langchain-agent-chat-dev` after UI changes.
      target: runner
      args:
        # Baked into the Next bundle at build time (browser → this app’s /api).
        NEXT_PUBLIC_API_URL: ${LANGCHAIN_AGENT_CHAT_PUBLIC_API_URL:-http://localhost:3000/api}
        NEXT_PUBLIC_ASSISTANT_ID: agent
        NEXT_PUBLIC_AUTH_SCHEME: ""
        # Server-side proxy to LangGraph inside Compose (also set at runtime below).
        LANGGRAPH_API_URL: http://langgraph-dev:2024
    environment:
      NEXT_PUBLIC_API_URL: ${LANGCHAIN_AGENT_CHAT_PUBLIC_API_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_ASSISTANT_ID: agent
      NEXT_PUBLIC_AUTH_SCHEME: ""
      LANGGRAPH_API_URL: http://langgraph-dev:2024
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    healthcheck:
      # `runner` image is node:22-alpine; busybox wget is present.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

volumes:
  # Named volumes avoid host permission / NFS issues for Postgres and LangGraph API state.
  langgraph_postgres_data:
  langgraph_state:

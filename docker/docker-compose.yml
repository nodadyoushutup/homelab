name: homelab-dev

services:
  # rag-engine-dev → Chroma on Swarm only. `environment` below overrides RAG_CHROMA_* from .secrets/.env
  # so a Swarm-only hostname like `chromadb` does not break Compose (see docs/rag/operators-and-clients.md).
  # Override: export HOMELAB_DEV_CHROMA_HOST=... HOMELAB_DEV_CHROMA_PORT=... before `docker compose up`.
  rag-engine-dev:
    image: homelab/rag-engine:latest
    pull_policy: never
    build:
      context: ../applications/rag-engine
      dockerfile: Dockerfile
    env_file:
      - ../.secrets/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      RAG_CHROMA_HOST: ${HOMELAB_DEV_CHROMA_HOST:-192.168.1.120}
      RAG_CHROMA_PORT: ${HOMELAB_DEV_CHROMA_PORT:-8000}
    ports:
      - "9015:8080"
    volumes:
      - ../applications/rag-engine/src:/app/src:ro
    healthcheck:
      test: ["CMD", "rag-engine-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  mcp-rag-dev:
    image: homelab/mcp-rag:latest
    pull_policy: never
    build:
      context: ../applications/mcp-rag
      dockerfile: Dockerfile
    env_file:
      - ../.secrets/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      RAG_ENGINE_BASE_URL: http://rag-engine-dev:8080
    depends_on:
      rag-engine-dev:
        condition: service_healthy
    ports:
      - "9016:8080"
    volumes:
      - ../applications/mcp-rag/src:/app/src:ro
    healthcheck:
      test: ["CMD", "mcp-rag", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  langgraph-postgres:
    image: postgres:17-alpine
    env_file:
      - ../.secrets/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langgraph_postgres_data:/var/lib/postgresql/data

  langgraph-dev:
    image: homelab/langgraph:latest
    pull_policy: never
    build:
      context: ../applications/langgraph
      dockerfile: docker/Dockerfile
    # Override stale image WorkingDir (e.g. /app/langgraph/apps/...): the OCI
    # runtime mkdirs cwd on start; NFS root_squash makes that fail for root.
    working_dir: /app/langgraph/agent
    env_file:
      - ../.secrets/.env
    depends_on:
      langgraph-postgres:
        condition: service_healthy
      mcp-rag-dev:
        condition: service_healthy
    environment:
      HOMELAB_REPO_ROOT: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_NO_CACHE_DIR: "1"
      # Route MCP RAG to the compose stack (see mcp.json url_from_env on mcp-rag).
      HOMELAB_MCP_RAG_URL: http://mcp-rag-dev:8080/mcp
    ports:
      - "2124:2024"
    volumes:
      - ../applications/langgraph:/app/langgraph
      - ../docs:/app/docs:ro
      - langgraph_state:/app/langgraph/agent/.langgraph_api
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "/usr/local/bin/langgraph_compose_healthcheck.py",
        ]
      interval: 10s
      timeout: 35s
      retries: 18
      start_period: 120s

  langchain-agent-chat-dev:
    image: homelab/langchain-agent-chat:latest
    pull_policy: never
    build:
      context: ../applications/langchain-agent-chat
      dockerfile: Dockerfile
      target: builder
      args:
        # Browser-facing dev chat API. Keep this on the Docker dev chat app,
        # never on the Kubernetes/prod LangGraph endpoint.
        NEXT_PUBLIC_API_URL: ${LANGCHAIN_AGENT_CHAT_PUBLIC_API_URL:-http://localhost:3000/api}
        NEXT_PUBLIC_ASSISTANT_ID: agent
        NEXT_PUBLIC_AUTH_SCHEME: ""
        # Server-side proxy target inside the Compose network.
        LANGGRAPH_API_URL: http://langgraph-dev:2024
    depends_on:
      langgraph-dev:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${LANGCHAIN_AGENT_CHAT_PUBLIC_API_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_ASSISTANT_ID: agent
      NEXT_PUBLIC_AUTH_SCHEME: ""
      LANGGRAPH_API_URL: http://langgraph-dev:2024
      NEXT_TELEMETRY_DISABLED: "1"
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ../applications/langchain-agent-chat:/app
      - langchain_agent_chat_node_modules:/app/node_modules

volumes:
  langgraph_postgres_data:
  langgraph_state:
  langchain_agent_chat_node_modules:
